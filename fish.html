<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐟 Fish Frenzy!</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#000; overflow:hidden; touch-action:none; -webkit-user-select:none; user-select:none; } canvas { display:block; margin:0 auto; }</style>
</head>
<body>
<script>
// FISH FRENZY — Phaser 3
// CCGS MDA: Mechanics=eat-grow-dodge | Dynamics=risk/reward (chase big fish vs get eaten) | Aesthetics=scale mastery + chaos
// Player Fantasy: tiny fish that grows into ocean apex predator
// Flow State: small→vulnerable→growing→powerful→TURBO DASH predator mode

const GW = Math.min(window.innerWidth, 480);
const GH = window.innerHeight;

// Fish color palettes
const FISH_COLORS = [
  {body:0xff6644,fin:0xdd4422,eye:0x111111},
  {body:0xffcc00,fin:0xddaa00,eye:0x111111},
  {body:0x44aaff,fin:0x2288dd,eye:0x111111},
  {body:0xff44aa,fin:0xdd2288,eye:0x111111},
  {body:0x44ffaa,fin:0x22ddbb,eye:0x111111},
  {body:0xff8800,fin:0xdd6600,eye:0x111111},
  {body:0xaa44ff,fin:0x8822dd,eye:0x111111},
];

class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }
  create() {
    const g = this.make.graphics({x:0,y:0,add:false});
    // Generate fish textures for each size tier (1-5)
    for(let tier=1;tier<=5;tier++){
      const pal=FISH_COLORS[tier%FISH_COLORS.length];
      const w=16+tier*8,h=10+tier*4;
      g.clear();
      g.fillStyle(pal.body,1); g.fillEllipse(w/2,h/2,w*0.8,h);
      g.fillStyle(pal.fin,1); g.fillTriangle(w*0.72,0,w,h/2,w*0.72,h); // tail
      g.fillTriangle(w*0.35,0,w*0.35,h*0.4,w*0.15,h*0.2); // top fin
      g.fillStyle(pal.eye,1); g.fillCircle(w*0.18,h*0.38,Math.max(2,h*0.15));
      g.fillStyle(0xffffff,1); g.fillCircle(w*0.17,h*0.35,Math.max(1,h*0.07));
      g.generateTexture(`fish${tier}`,w,h);
    }
    // Player fish base
    g.clear();
    g.fillStyle(0x00d4ff,1); g.fillEllipse(20,12,32,20);
    g.fillStyle(0x0088aa,1); g.fillTriangle(30,0,40,12,30,24);
    g.fillTriangle(18,0,18,8,8,4);
    g.fillStyle(0x111111,1); g.fillCircle(8,10,3);
    g.fillStyle(0xffffff,1); g.fillCircle(7,9,1.5);
    g.generateTexture('player_fish',40,24);
    // Power-up: size boost
    g.clear();g.fillStyle(0xff6600,0.9);g.fillCircle(16,16,14);g.fillStyle(0xffaa00,1);g.fillCircle(16,16,9);
    g.fillStyle(0xffffff,1);g.fillRect(13,5,3,22);g.fillRect(5,13,22,3);
    g.generateTexture('pu_size',32,32);
    // Power-up: speed
    g.clear();g.fillStyle(0x00ffcc,0.9);g.fillCircle(16,16,14);g.fillStyle(0x00cc88,1);g.fillCircle(16,16,9);
    g.fillStyle(0xffffff,1);g.fillTriangle(22,8,10,16,22,24);
    g.generateTexture('pu_speed',32,32);
    // Power-up: magnet
    g.clear();g.fillStyle(0xff44ff,0.9);g.fillCircle(16,16,14);g.fillStyle(0xdd22dd,1);g.fillCircle(16,16,9);
    for(let i=0;i<6;i++){const a=i*60*Math.PI/180;g.fillStyle(0xffffff,1);g.fillCircle(16+Math.cos(a)*6,16+Math.sin(a)*6,2);}
    g.generateTexture('pu_magnet',32,32);
    // Particle
    g.clear();g.fillStyle(0xffffff,1);g.fillCircle(3,3,3);g.generateTexture('particle',6,6);
    // Bubble
    g.clear();g.lineStyle(1.5,0x88ddff,0.6);g.strokeCircle(5,5,5);g.generateTexture('bubble',10,10);
    g.destroy();
    this.scene.start('MenuScene');
  }
}

class MenuScene extends Phaser.Scene {
  constructor() { super('MenuScene'); }
  create() {
    const W=this.scale.width,H=this.scale.height;
    this.cameras.main.setBackgroundColor('#001a33');
    this.bgGfx=this.add.graphics();this.fishGfx=this.add.graphics();this.t=0;
    this.previewFish=[];
    for(let i=0;i<8;i++){this.previewFish.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*60,vy:(Math.random()-0.5)*30,tier:Phaser.Math.Between(1,4),pal:FISH_COLORS[i%FISH_COLORS.length]});}
    const fs=n=>Math.floor(W*n);
    this.add.text(W/2,H*0.1,'🐟 FISH FRENZY!',{fontSize:`${fs(0.085)}px`,fontFamily:'Arial Black,sans-serif',color:'#00d4ff',stroke:'#001133',strokeThickness:5}).setOrigin(0.5);
    this.add.text(W/2,H*0.22,'EAT TO GROW!',{fontSize:`${fs(0.05)}px`,fontFamily:'Arial Black,sans-serif',color:'#ffcc00',stroke:'#442200',strokeThickness:3}).setOrigin(0.5);
    const hs=localStorage.getItem('ff_hs')||0;
    this.add.text(W/2,H*0.32,`🏆 BEST: ${hs}`,{fontSize:`${fs(0.042)}px`,fontFamily:'Arial,sans-serif',color:'#ffdd88'}).setOrigin(0.5);
    const btn=this.add.text(W/2,H*0.65,' ▶ SWIM! ',{fontSize:`${fs(0.075)}px`,fontFamily:'Arial Black,sans-serif',color:'#ffffff',backgroundColor:'#00d4ff33',padding:{x:24,y:14},stroke:'#00d4ff',strokeThickness:2}).setOrigin(0.5).setInteractive({useHandCursor:true});
    btn.on('pointerdown',()=>{this.cameras.main.flash(200,0,212,255);this.time.delayedCall(200,()=>this.scene.start('GameScene'));});
    this.tweens.add({targets:btn,scaleX:1.06,scaleY:1.06,yoyo:true,repeat:-1,duration:650,ease:'Sine.InOut'});
    this.add.text(W/2,H*0.79,'Tap/Click to swim toward  •  EAT smaller fish\nDOUBLE TAP = TURBO DASH',{fontSize:`${fs(0.033)}px`,fontFamily:'Arial,sans-serif',color:'#6688aa',align:'center',lineSpacing:4}).setOrigin(0.5);
    this.add.text(W/2,H*0.92,'🔥 Size Boost  •  ⚡ Speed  •  🧲 Magnet',{fontSize:`${fs(0.031)}px`,fontFamily:'Arial,sans-serif',color:'#445566',align:'center'}).setOrigin(0.5);
  }
  update(t,dt) {
    this.t+=dt/1000;const W=this.scale.width,H=this.scale.height;
    this.bgGfx.clear();
    for(let y=0;y<H;y+=22){const d=y/H;this.bgGfx.fillStyle(Phaser.Display.Color.GetColor(0,Math.floor(26+50*d),Math.floor(51+100*d)),1);this.bgGfx.fillRect(0,y,W,22);}
    this.fishGfx.clear();
    this.previewFish.forEach(f=>{
      f.x+=f.vx*dt/1000;f.y+=f.vy*dt/1000;
      if(f.x>W+40)f.x=-40;else if(f.x<-40)f.x=W+40;
      if(f.y>H+20)f.y=-20;else if(f.y<-20)f.y=H+20;
      const s=0.5+f.tier*0.3,w=24*s,h=14*s;
      const flip=f.vx<0;
      this.fishGfx.fillStyle(f.pal.body,0.5);
      this.fishGfx.fillEllipse(f.x,f.y,w*0.8,h);
      this.fishGfx.fillStyle(f.pal.fin,0.4);
      if(!flip)this.fishGfx.fillTriangle(f.x+w*0.26,f.y-h*0.4,f.x+w*0.4,f.y,f.x+w*0.26,f.y+h*0.4);
      else this.fishGfx.fillTriangle(f.x-w*0.26,f.y-h*0.4,f.x-w*0.4,f.y,f.x-w*0.26,f.y+h*0.4);
    });
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }
  create() {
    const W=this.scale.width,H=this.scale.height;
    this.W=W;this.H=H;
    this.score=0;this.lives=3;this.gameTime=0;this.gameOver=false;
    this.playerSize=1;this.playerMaxSize=8;this.eatProgress=0;this.eatNeeded=5;
    this.speedBoost=false;this.speedTimer=0;this.magnetActive=false;this.magnetTimer=0;
    this.sizeBoostTimer=0;this.sizeBoostActive=false;
    this.dashVX=0;this.dashVY=0;this.dashDur=0;this.lastTapTime=0;
    this.turboMeter=0;this.turboActive=false;this.turboTimer=0;
    this.invincible=false;this.invincibleTimer=0;
    this.tapTarget={x:W/2,y:H/2};this.usingTouch=false;
    this.bgGfx=this.add.graphics().setDepth(0);this.waterGfx=this.add.graphics().setDepth(1);
    this.bubbles=Array.from({length:30},()=>({x:Phaser.Math.Between(0,W),y:Phaser.Math.Between(0,H),r:Phaser.Math.FloatBetween(2,6),sp:Phaser.Math.FloatBetween(0.4,1.5)}));
    this.waterT=0;
    // Groups
    this.fishGroup=this.physics.add.group();
    this.puGroup=this.physics.add.group();
    // Particles
    this.eatFX=this.add.particles(0,0,'particle',{speed:{min:40,max:160},scale:{start:0.6,end:0},alpha:{start:1,end:0},lifespan:{min:150,max:400},quantity:1,emitting:false,tint:[0xffcc00,0xff8800,0xffffff,0xff4444]}).setDepth(15);
    this.bubbleEmit=this.add.particles(0,0,'bubble',{speed:{min:20,max:80},angle:{min:-100,max:-80},scale:{start:0.7,end:0},alpha:{start:0.6,end:0},lifespan:{min:400,max:900},quantity:1,emitting:false}).setDepth(5);
    // Player
    this.player=this.physics.add.sprite(W/2,H/2,'player_fish').setDepth(10);
    this.player.setCollideWorldBounds(true);this.player.body.setGravityY(0);
    this.playerGfx=this.add.graphics().setDepth(10);
    this.shieldGfx=this.add.graphics().setDepth(11);
    // UI
    const fs=n=>Math.floor(W*n);
    this.scoreTxt=this.add.text(10,10,'0',{fontSize:`${fs(0.05)}px`,fontFamily:'Arial Black,sans-serif',color:'#ffd700'}).setDepth(40);
    this.sizeTxt=this.add.text(W/2,10,'SIZE 1',{fontSize:`${fs(0.042)}px`,fontFamily:'Arial Black,sans-serif',color:'#00d4ff'}).setOrigin(0.5,0).setDepth(40);
    this.heartsTxt=this.add.text(W-10,10,'❤️❤️❤️',{fontSize:`${fs(0.042)}px`}).setOrigin(1,0).setDepth(40);
    this.eatBar=this.add.graphics().setDepth(41);
    this.turboBg=this.add.graphics().setDepth(40);
    this.turboBarGfx=this.add.graphics().setDepth(41);
    this.puTxt=this.add.text(W/2,H-36,'',{fontSize:`${fs(0.035)}px`,fontFamily:'Arial,sans-serif',color:'#00ffcc'}).setOrigin(0.5,1).setDepth(40);
    this.turboStatusTxt=this.add.text(W/2,H*0.45,'',{fontSize:`${fs(0.065)}px`,fontFamily:'Arial Black,sans-serif',color:'#ff8800',stroke:'#fff',strokeThickness:3}).setOrigin(0.5).setDepth(55);
    // Input
    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys({up:Phaser.Input.Keyboard.KeyCodes.W,down:Phaser.Input.Keyboard.KeyCodes.S,left:Phaser.Input.Keyboard.KeyCodes.A,right:Phaser.Input.Keyboard.KeyCodes.D});
    this.spaceKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.input.on('pointerdown',this.onTap,this);
    // Overlaps
    this.physics.add.overlap(this.player,this.fishGroup,this.tryEat,null,this);
    this.physics.add.overlap(this.player,this.puGroup,this.hitPowerup,null,this);
    // Spawn
    this.fishSpawnTimer=0;this.puSpawnTimer=0;
    for(let i=0;i<10;i++)this.spawnFish();
  }

  onTap(p) {
    if(this.gameOver)return;
    const now=this.time.now;
    if(now-this.lastTapTime<280)this.triggerTurbo(p.x,p.y);
    this.lastTapTime=now;
    this.tapTarget={x:p.x,y:p.y};this.usingTouch=true;
  }

  triggerTurbo(tx,ty) {
    if(this.turboMeter<0.5)return;
    const dx=tx-this.player.x,dy=ty-this.player.y,dist=Math.sqrt(dx*dx+dy*dy)+0.01;
    const spd=650;this.dashVX=(dx/dist)*spd;this.dashVY=(dy/dist)*spd;this.dashDur=0.3;
    this.turboMeter=0;this.turboActive=true;this.turboTimer=0.3;
    this.cameras.main.shake(200,0.015);
    this.eatFX.setPosition(this.player.x,this.player.y);this.eatFX.explode(10);
    this.showStatus('💥 TURBO DASH!',1.2);
  }

  showStatus(msg,dur) {
    this.turboStatusTxt.setText(msg).setAlpha(1);
    this.tweens.add({targets:this.turboStatusTxt,alpha:0,duration:dur*1000,ease:'Power2'});
  }

  update(t,delta) {
    if(this.gameOver)return;
    const dt=delta/1000;
    this.gameTime+=dt;this.waterT+=dt;
    // Timers
    if(this.invincibleTimer>0){this.invincibleTimer-=dt;if(this.invincibleTimer<=0){this.invincible=false;this.player.setAlpha(1);}}
    if(this.speedTimer>0){this.speedTimer-=dt;if(this.speedTimer<=0)this.speedBoost=false;}
    if(this.magnetTimer>0){this.magnetTimer-=dt;if(this.magnetTimer<=0)this.magnetActive=false;}
    if(this.sizeBoostTimer>0){this.sizeBoostTimer-=dt;if(this.sizeBoostTimer<=0)this.sizeBoostActive=false;}
    if(this.dashDur>0){this.dashDur-=dt;this.player.body.setVelocity(this.dashVX,this.dashVY);this.eatFX.setPosition(this.player.x,this.player.y);this.eatFX.explode(2);}
    else{this.handleMovement(dt);if(this.turboTimer>0){this.turboTimer-=dt;if(this.turboTimer<=0)this.turboActive=false;}}
    if(Phaser.Input.Keyboard.JustDown(this.spaceKey))this.triggerTurbo(this.player.x,this.player.y-50);
    // Turbo meter fill
    if(!this.turboActive)this.turboMeter=Math.min(1,this.turboMeter+dt*0.12);
    // Magnet: attract small fish/powerups
    if(this.magnetActive){
      [...this.fishGroup.getChildren(),...this.puGroup.getChildren()].forEach(obj=>{
        const dx=this.player.x-obj.x,dy=this.player.y-obj.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<160&&dist>5){const f=60/dist;obj.x+=dx*f*dt;obj.y+=dy*f*dt;}
      });
    }
    // Spawn fish
    this.fishSpawnTimer-=dt;
    if(this.fishSpawnTimer<=0){this.spawnFish();this.fishSpawnTimer=0.8+Math.random()*0.8;}
    this.puSpawnTimer-=dt;
    if(this.puSpawnTimer<=0){this.spawnPowerup();this.puSpawnTimer=6+Math.random()*6;}
    // Update fish movement
    this.fishGroup.getChildren().forEach(f=>{
      if(!f.active)return;
      f.swimTimer-=dt;
      if(f.swimTimer<=0){
        f.swimTimer=1+Math.random()*2;
        const angle=Math.random()*Math.PI*2;
        f.body.setVelocity(Math.cos(angle)*f.speed,Math.sin(angle)*f.speed*0.5);
        f.body.velocity.x+=Phaser.Math.Between(-20,20);
      }
      f.flipX=f.body.velocity.x<0;
      // Bounce off edges
      if(f.x<30||f.x>this.W-30)f.body.velocity.x*=-1;
      if(f.y<40||f.y>this.H-40)f.body.velocity.y*=-1;
      // Wiggle
      f.rotation=Math.sin(this.gameTime*4+f.x)*0.12;
    });
    this.bubbleEmit.setPosition(this.player.x,this.player.y);
    if(Math.random()<0.05)this.bubbleEmit.explode(1);
    this.updateBackground(dt);
    this.drawShield();
    this.updateUI();
    if(this.invincible)this.player.setAlpha(Math.sin(this.gameTime*22)>0?0.3:1);
  }

  handleMovement(dt) {
    const baseSpd=120+(this.playerSize*10);
    const spd=(this.speedBoost?baseSpd*2.2:baseSpd)+(this.turboActive?100:0);
    let vx=0,vy=0;
    if(this.usingTouch){
      const dx=this.tapTarget.x-this.player.x,dy=this.tapTarget.y-this.player.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>15){vx=(dx/dist)*spd;vy=(dy/dist)*spd;}
    } else {
      if(this.cursors.left.isDown||this.wasd.left.isDown)vx=-spd;
      else if(this.cursors.right.isDown||this.wasd.right.isDown)vx=spd;
      if(this.cursors.up.isDown||this.wasd.up.isDown)vy=-spd;
      else if(this.cursors.down.isDown||this.wasd.down.isDown)vy=spd;
    }
    this.player.body.setVelocity(vx,vy);
    if(vx!==0)this.player.flipX=vx<0;
    this.player.rotation=Phaser.Math.Linear(this.player.rotation,Math.atan2(vy,vx+(0.01*(!vx?1:0)))*0.2,0.12);
  }

  spawnFish() {
    const W=this.W,H=this.H;
    // Spawn fish of random size — weighted toward smaller than player
    const maxTier=Math.min(5,this.playerSize+2);
    const tier=Phaser.Math.Between(1,maxTier);
    const side=Phaser.Math.Between(0,3);
    let x,y;
    if(side===0){x=Phaser.Math.Between(20,W-20);y=-20;}
    else if(side===1){x=W+20;y=Phaser.Math.Between(20,H-20);}
    else if(side===2){x=Phaser.Math.Between(20,W-20);y=H+20;}
    else{x=-20;y=Phaser.Math.Between(20,H-20);}
    const f=this.fishGroup.create(x,y,`fish${Math.min(tier,5)}`).setDepth(8);
    f.fishTier=tier;f.body.setGravityY(0);f.speed=40+tier*20;
    f.swimTimer=0;f.body.setVelocity(Phaser.Math.Between(-80,80),Phaser.Math.Between(-50,50));
    f.setBodySize(Math.floor((16+tier*8)*0.7),Math.floor((10+tier*4)*0.7));
    // Color tint per palette
    const pal=FISH_COLORS[tier%FISH_COLORS.length];
    f.setTint(pal.body);
  }

  spawnPowerup() {
    const W=this.W,H=this.H;
    const types=['pu_size','pu_speed','pu_magnet'];
    const t=types[Phaser.Math.Between(0,2)];
    const pu=this.puGroup.create(Phaser.Math.Between(40,W-40),Phaser.Math.Between(60,H-60),t).setDepth(9);
    pu.puType=t;pu.body.setGravityY(0);pu.body.setVelocity(0,0);
    this.tweens.add({targets:pu,scaleX:{from:0.8,to:1.2},scaleY:{from:0.8,to:1.2},yoyo:true,repeat:-1,duration:600});
  }

  tryEat(player,fish) {
    if(!fish.active)return;
    const canEat=(this.playerSize>fish.fishTier)||(this.turboActive&&this.playerSize>=fish.fishTier);
    if(canEat){
      const px=fish.x,py=fish.y;fish.destroy();
      this.eatFX.setPosition(px,py);this.eatFX.explode(8);
      this.score+=fish.fishTier*100;
      this.eatProgress++;
      if(this.eatProgress>=this.eatNeeded&&this.playerSize<this.playerMaxSize){
        this.playerSize++;this.eatProgress=0;this.eatNeeded=Math.floor(this.eatNeeded*1.5);
        this.cameras.main.shake(200,0.012);
        this.showStatus('📈 GREW BIGGER!',1.2);
        this.turboMeter=Math.min(1,this.turboMeter+0.3);
        this.player.setScale(0.6+this.playerSize*0.15);
      }
    } else if(fish.fishTier>this.playerSize&&!this.invincible){
      // Got eaten
      this.invincible=true;this.invincibleTimer=2.5;
      this.cameras.main.shake(300,0.02);this.cameras.main.flash(200,255,0,0);
      this.eatFX.setPosition(player.x,player.y);this.eatFX.explode(12);
      this.lives--;
      if(this.lives<=0)this.endGame();
      else this.tweens.add({targets:player,alpha:0.3,yoyo:true,repeat:8,duration:150});
    }
  }

  hitPowerup(player,pu) {
    const type=pu.puType;pu.destroy();
    const msgs={pu_size:'🔥 BIGGER!',pu_speed:'⚡ SPEED!',pu_magnet:'🧲 MAGNET!'};
    if(type==='pu_size'){if(this.playerSize<this.playerMaxSize){this.playerSize++;this.player.setScale(0.6+this.playerSize*0.15);}}
    else if(type==='pu_speed'){this.speedBoost=true;this.speedTimer=7;}
    else if(type==='pu_magnet'){this.magnetActive=true;this.magnetTimer=8;}
    const ft=this.add.text(this.W/2,this.H*0.45,msgs[type]||'',{fontSize:`${Math.floor(this.W*0.06)}px`,fontFamily:'Arial Black,sans-serif',color:'#00ffcc',stroke:'#003333',strokeThickness:4}).setOrigin(0.5).setDepth(55).setAlpha(0);
    this.tweens.add({targets:ft,alpha:{from:1,to:0},y:this.H*0.35,duration:1300,ease:'Power2',onComplete:()=>ft.destroy()});
  }

  updateBackground(dt) {
    const W=this.W,H=this.H;
    this.bgGfx.clear();
    for(let y=0;y<H;y+=20){const d=y/H;this.bgGfx.fillStyle(Phaser.Display.Color.GetColor(0,Math.floor(20+55*d),Math.floor(40+110*d)),1);this.bgGfx.fillRect(0,y,W,20);}
    this.waterGfx.clear();
    this.bubbles.forEach(b=>{b.y-=b.sp;b.x+=Math.sin(this.waterT+b.y*0.02)*0.3;if(b.y<-8){b.y=H+8;b.x=Phaser.Math.Between(0,W);}this.waterGfx.lineStyle(1,0x88ddff,0.2);this.waterGfx.strokeCircle(b.x,b.y,b.r);});
    // Light rays from surface
    for(let i=0;i<4;i++){const rx=W*0.15+i*W*0.23;const ry=0;this.waterGfx.fillStyle(0xaaddff,0.025);this.waterGfx.fillTriangle(rx-15,ry,rx+15,ry,rx+40,H,rx-40,H);}
  }

  drawShield() {
    this.shieldGfx.clear();
    if(this.magnetActive){const p=0.3+0.3*Math.sin(this.gameTime*5);this.shieldGfx.lineStyle(2,0xff44ff,p);this.shieldGfx.strokeCircle(this.player.x,this.player.y,160);}
    if(this.turboActive){const p=0.6+0.4*Math.sin(this.gameTime*12);this.shieldGfx.lineStyle(3,0xff8800,p);this.shieldGfx.strokeCircle(this.player.x,this.player.y,40+this.playerSize*6);}
  }

  updateUI() {
    const W=this.W,H=this.H;
    this.scoreTxt.setText(`${this.score}`);
    this.sizeTxt.setText(`SIZE ${this.playerSize}`);
    this.heartsTxt.setText('❤️'.repeat(Math.max(0,this.lives)));
    // Eat progress bar
    const bw=W*0.4,bx=W/2-bw/2;
    this.eatBar.clear().fillStyle(0x111111,0.6).fillRoundedRect(bx,H-52,bw,10,5);
    this.eatBar.fillStyle(0x00d4ff,1).fillRoundedRect(bx,H-52,bw*(this.eatProgress/this.eatNeeded),10,5);
    // Turbo bar
    this.turboBg.clear().fillStyle(0x111111,0.6).fillRoundedRect(bx,H-64,bw,8,4);
    const tCol=this.turboMeter>=0.5?0xff8800:0x554422;
    this.turboBarGfx.clear().fillStyle(tCol,1).fillRoundedRect(bx,H-64,bw*this.turboMeter,8,4);
    let pu='';
    if(this.speedBoost)pu+=`⚡${Math.ceil(this.speedTimer)}s `;
    if(this.magnetActive)pu+=`🧲${Math.ceil(this.magnetTimer)}s `;
    if(this.turboActive)pu+='💥TURBO!';
    this.puTxt.setText(pu);
    // Scale fish size
    const targetScale=0.6+this.playerSize*0.15;
    this.player.setScale(Phaser.Math.Linear(this.player.scaleX,targetScale*(this.turboActive?1.2:1),0.05));
  }

  endGame() {
    this.gameOver=true;
    const hs=parseInt(localStorage.getItem('ff_hs')||'0');
    if(this.score>hs)localStorage.setItem('ff_hs',this.score);
    this.cameras.main.clearTint();
    this.time.delayedCall(600,()=>this.scene.start('GameOverScene',{score:this.score,size:this.playerSize,hs:Math.max(this.score,hs)}));
  }
}

class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOverScene'); }
  create(data) {
    const W=this.scale.width,H=this.scale.height;
    this.cameras.main.setBackgroundColor('#001a33');
    this.cameras.main.fadeIn(400,0,0,0);
    const fs=n=>Math.floor(W*n);
    this.add.text(W/2,H*0.15,'🐟 GAME OVER',{fontSize:`${fs(0.1)}px`,fontFamily:'Arial Black,sans-serif',color:'#00d4ff',stroke:'#000',strokeThickness:6}).setOrigin(0.5);
    this.add.text(W/2,H*0.3,`SCORE: ${data.score}`,{fontSize:`${fs(0.065)}px`,fontFamily:'Arial Black,sans-serif',color:'#ffd700'}).setOrigin(0.5);
    this.add.text(W/2,H*0.42,`🐠 Max Size: ${data.size}`,{fontSize:`${fs(0.05)}px`,fontFamily:'Arial,sans-serif',color:'#00d4ff'}).setOrigin(0.5);
    this.add.text(W/2,H*0.52,`🏆 BEST: ${data.hs}`,{fontSize:`${fs(0.045)}px`,fontFamily:'Arial,sans-serif',color:'#ffdd88'}).setOrigin(0.5);
    if(data.score>=data.hs&&data.score>0)this.add.text(W/2,H*0.62,'🎉 NEW HIGH SCORE! 🎉',{fontSize:`${fs(0.042)}px`,fontFamily:'Arial Black,sans-serif',color:'#00ff88'}).setOrigin(0.5);
    const btn=this.add.text(W/2,H*0.75,' SWIM AGAIN ',{fontSize:`${fs(0.07)}px`,fontFamily:'Arial Black,sans-serif',color:'#ffffff',backgroundColor:'#00d4ff33',padding:{x:20,y:12},stroke:'#00d4ff',strokeThickness:2}).setOrigin(0.5).setInteractive({useHandCursor:true});
    btn.on('pointerdown',()=>{this.cameras.main.fade(200,0,0,0);this.time.delayedCall(200,()=>this.scene.start('GameScene'));});
    this.tweens.add({targets:btn,scaleX:1.05,scaleY:1.05,yoyo:true,repeat:-1,duration:700,ease:'Sine.InOut'});
    const menu=this.add.text(W/2,H*0.88,'◀ MENU',{fontSize:`${fs(0.035)}px`,fontFamily:'Arial,sans-serif',color:'#445566'}).setOrigin(0.5).setInteractive({useHandCursor:true});
    menu.on('pointerdown',()=>this.scene.start('MenuScene'));
  }
}

new Phaser.Game({
  type:Phaser.AUTO,width:GW,height:GH,backgroundColor:'#001a33',
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  scene:[BootScene,MenuScene,GameScene,GameOverScene],
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  parent:document.body
});
</script>
</body>
</html>
