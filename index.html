<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ALBERTO'S WAVE SHOOTER</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
canvas { display: block; }
#ui {
  position: absolute; top: 0; left: 0; width: 100%; padding: 12px 20px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none; z-index: 10;
}
#ui > div { display: flex; align-items: center; gap: 8px; }
.ui-label {
  color: #fff; font-size: 18px; font-weight: 800;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  letter-spacing: 1px;
}
.ui-value {
  color: #ffd700; font-size: 22px; font-weight: 900;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  min-width: 60px;
}
#health-bar-bg {
  width: 200px; height: 20px; background: #333; border-radius: 10px;
  border: 2px solid #555; overflow: hidden;
}
#health-bar {
  width: 100%; height: 100%; background: linear-gradient(90deg, #ff4444, #ff6b6b);
  border-radius: 8px; transition: width 0.3s;
}
#wave-banner {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: #fff; font-size: 64px; font-weight: 900; opacity: 0;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
  pointer-events: none; z-index: 20;
  letter-spacing: 3px;
}
#game-over {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); display: none; flex-direction: column;
  justify-content: center; align-items: center; z-index: 30;
}
#game-over h1 {
  color: #ff4444; font-size: 72px; font-weight: 900; margin-bottom: 20px;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
  letter-spacing: 4px;
}
#game-over .final-score {
  color: #ffd700; font-size: 36px; font-weight: 700; margin-bottom: 10px;
}
#game-over .final-wave {
  color: #aaa; font-size: 24px; margin-bottom: 40px;
}
#play-again {
  background: linear-gradient(135deg, #00d4ff, #0099ff);
  color: #fff; border: none; padding: 18px 50px; font-size: 28px;
  font-weight: 800; border-radius: 15px; cursor: pointer;
  letter-spacing: 2px;
  box-shadow: 0 4px 15px rgba(0, 150, 255, 0.4);
  transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
#play-again:active { transform: scale(0.95); }
#start-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  display: flex; flex-direction: column; justify-content: center;
  align-items: center; z-index: 40;
}
#start-screen h1 {
  color: #fff; font-size: 52px; font-weight: 900; margin-bottom: 8px;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
  letter-spacing: 3px;
  background: linear-gradient(135deg, #00d4ff, #ffd700, #ff6b6b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
#start-screen .subtitle {
  color: #aaa; font-size: 20px; margin-bottom: 40px; font-weight: 500;
}
#start-screen .controls {
  color: #888; font-size: 16px; margin-top: 30px; text-align: center; line-height: 1.8;
}
#start-btn {
  background: linear-gradient(135deg, #ff6b6b, #ff4444);
  color: #fff; border: none; padding: 20px 60px; font-size: 32px;
  font-weight: 900; border-radius: 15px; cursor: pointer;
  letter-spacing: 3px;
  box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
  animation: pulse 1.5s ease-in-out infinite;
  -webkit-tap-highlight-color: transparent;
}
#start-btn:active { transform: scale(0.95); }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
#powerup-indicator {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px; z-index: 10; pointer-events: none;
}
.powerup-badge {
  padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 700;
  color: #fff; opacity: 0; transition: opacity 0.3s;
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui">
  <div>
    <span class="ui-label">SCORE</span>
    <span class="ui-value" id="score-display">0</span>
  </div>
  <div>
    <span class="ui-label">WAVE</span>
    <span class="ui-value" id="wave-display">1</span>
  </div>
  <div>
    <span class="ui-label">HP</span>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
  </div>
</div>

<div id="wave-banner"></div>

<div id="powerup-indicator">
  <div class="powerup-badge" id="badge-rapid" style="background:#ff4444;">⚡ RAPID FIRE</div>
  <div class="powerup-badge" id="badge-shield" style="background:#4444ff;">🛡 SHIELD</div>
  <div class="powerup-badge" id="badge-speed" style="background:#44ff44; color:#000;">💨 SPEED</div>
</div>

<div id="game-over">
  <h1>GAME OVER</h1>
  <div class="final-score" id="final-score">Score: 0</div>
  <div class="final-wave" id="final-wave">Wave 1</div>
  <button id="play-again">PLAY AGAIN</button>
</div>

<div id="start-screen">
  <h1>ALBERTO'S WAVE SHOOTER</h1>
  <div class="subtitle">Survive the waves. Get the high score.</div>
  <button id="start-btn">START GAME</button>
  <div class="controls">
    WASD / Arrow Keys to move &bull; Auto-aim + Spacebar to shoot<br>
    Tap to move on iPad &bull; Collect power-ups!
  </div>
</div>

<script>
// ============================================================
// ALBERTO'S WAVE SHOOTER — Built with love for Alberto
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Audio Engine ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch (type) {
    case 'shoot':
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.start(now); osc.stop(now + 0.08);
      break;
    case 'hit':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.12);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.start(now); osc.stop(now + 0.12);
      break;
    case 'explosion':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.3);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      break;
    case 'powerup':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
      break;
    case 'damage':
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
      break;
    case 'wave':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
      osc.frequency.exponentialRampToValueAtTime(900, now + 0.3);
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'gameover':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.6);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      osc.start(now); osc.stop(now + 0.6);
      break;
  }
}

// --- Game State ---
let W, H;
let gameRunning = false;
let score = 0;
let wave = 1;
let waveEnemiesLeft = 0;
let waveSpawnTimer = 0;
let waveEnemiesToSpawn = 0;
let waveBannerTimer = 0;
let betweenWaves = false;
let betweenWaveTimer = 0;

const keys = {};
let touchTarget = null;

// --- Resize ---
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

// --- Particles ---
const particles = [];

function spawnParticles(x, y, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.5 + Math.random());
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: life * (0.5 + Math.random() * 0.5),
      maxLife: life,
      color,
      size: 2 + Math.random() * 4,
    });
  }
}

// --- Floating Text ---
const floatingTexts = [];

function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 1.0, vy: -2 });
}

// --- Player ---
const player = {
  x: 0, y: 0, size: 22,
  speed: 4, baseSpeed: 4,
  hp: 100, maxHp: 100,
  shootTimer: 0, shootInterval: 12, baseShootInterval: 12,
  invincibleTimer: 0,
  shieldTimer: 0,
  rapidTimer: 0,
  speedTimer: 0,
  angle: -Math.PI / 2,
};

function resetPlayer() {
  player.x = W / 2;
  player.y = H - 100;
  player.hp = 100;
  player.speed = player.baseSpeed;
  player.shootInterval = player.baseShootInterval;
  player.shootTimer = 0;
  player.invincibleTimer = 0;
  player.shieldTimer = 0;
  player.rapidTimer = 0;
  player.speedTimer = 0;
  player.angle = -Math.PI / 2;
}

// --- Bullets ---
const bullets = [];

function spawnBullet(x, y, angle) {
  bullets.push({
    x, y,
    vx: Math.cos(angle) * 10,
    vy: Math.sin(angle) * 10,
    size: 5,
    damage: 20,
    life: 80,
  });
  playSound('shoot');
}

// --- Enemies ---
const enemies = [];

const ENEMY_TYPES = {
  grunt: { hp: 40, speed: 1.5, size: 18, color: '#ff6b6b', score: 100, bodyColor: '#cc4444' },
  runner: { hp: 25, speed: 3.5, size: 14, color: '#ffdd44', score: 150, bodyColor: '#ccaa22' },
  tank: { hp: 150, speed: 0.8, size: 30, color: '#8844ff', score: 300, bodyColor: '#6622cc' },
};

function spawnEnemy(type) {
  const def = ENEMY_TYPES[type];
  const side = Math.random();
  let x, y;
  if (side < 0.5) {
    // Top
    x = Math.random() * W;
    y = -def.size;
  } else if (side < 0.75) {
    // Left
    x = -def.size;
    y = Math.random() * H * 0.4;
  } else {
    // Right
    x = W + def.size;
    y = Math.random() * H * 0.4;
  }

  const hpScale = 1 + (wave - 1) * 0.15;
  const speedScale = 1 + (wave - 1) * 0.05;

  enemies.push({
    x, y, type,
    hp: def.hp * hpScale,
    maxHp: def.hp * hpScale,
    speed: def.speed * speedScale,
    size: def.size,
    color: def.color,
    bodyColor: def.bodyColor,
    score: def.score,
    zigTimer: 0,
    zigDir: 1,
    damageFlash: 0,
  });
}

// --- Power-ups ---
const powerups = [];
const POWERUP_TYPES = ['rapid', 'shield', 'speed'];
const POWERUP_COLORS = { rapid: '#ff4444', shield: '#4488ff', speed: '#44ff44' };
const POWERUP_ICONS = { rapid: '⚡', shield: '🛡', speed: '💨' };

function spawnPowerup(x, y) {
  if (Math.random() > 0.25) return; // 25% drop rate
  const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
  powerups.push({
    x, y, type,
    size: 16,
    life: 600, // 10 seconds at 60fps
    bobTimer: Math.random() * Math.PI * 2,
  });
}

// --- Stars Background ---
const stars = [];
for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    size: Math.random() * 2 + 0.5,
    speed: Math.random() * 0.5 + 0.2,
    brightness: Math.random() * 0.5 + 0.3,
  });
}

// --- Grid lines for floor ---
let gridOffset = 0;

// --- Input ---
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  ensureAudio();
  const touch = e.touches[0];
  touchTarget = { x: touch.clientX, y: touch.clientY };
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  touchTarget = { x: touch.clientX, y: touch.clientY };
});
canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  touchTarget = null;
});

// --- Wave Management ---
function startWave(num) {
  wave = num;
  const baseCount = 5 + num * 3;
  waveEnemiesToSpawn = baseCount;
  waveEnemiesLeft = baseCount;
  waveSpawnTimer = 0;
  betweenWaves = false;
  document.getElementById('wave-display').textContent = num;

  // Show wave banner
  const banner = document.getElementById('wave-banner');
  banner.textContent = `WAVE ${num}`;
  banner.style.opacity = '1';
  banner.style.transform = 'translate(-50%, -50%) scale(1.2)';
  banner.style.transition = 'opacity 0.3s, transform 0.3s';
  waveBannerTimer = 120;
  playSound('wave');

  setTimeout(() => {
    banner.style.opacity = '0';
    banner.style.transform = 'translate(-50%, -50%) scale(0.8)';
  }, 1500);
}

function getEnemyTypeForWave() {
  const r = Math.random();
  if (wave < 3) return 'grunt';
  if (wave < 5) return r < 0.7 ? 'grunt' : 'runner';
  if (wave < 8) {
    if (r < 0.4) return 'grunt';
    if (r < 0.75) return 'runner';
    return 'tank';
  }
  // Wave 8+
  if (r < 0.3) return 'grunt';
  if (r < 0.65) return 'runner';
  return 'tank';
}

// --- Game Logic ---
function update() {
  if (!gameRunning) return;

  // Player movement
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['arrowdown']) dy += 1;
  if (keys['a'] || keys['arrowleft']) dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;

  // Touch movement
  if (touchTarget) {
    const tdx = touchTarget.x - player.x;
    const tdy = touchTarget.y - player.y;
    const dist = Math.sqrt(tdx * tdx + tdy * tdy);
    if (dist > 10) {
      dx = tdx / dist;
      dy = tdy / dist;
    }
  }

  // Normalize diagonal
  if (dx !== 0 && dy !== 0) {
    const len = Math.sqrt(dx * dx + dy * dy);
    dx /= len; dy /= len;
  }

  const currentSpeed = player.speedTimer > 0 ? player.speed * 1.6 : player.speed;
  player.x += dx * currentSpeed;
  player.y += dy * currentSpeed;

  // Clamp to screen
  player.x = Math.max(player.size, Math.min(W - player.size, player.x));
  player.y = Math.max(player.size + 50, Math.min(H - player.size, player.y));

  // Power-up timers
  if (player.shieldTimer > 0) player.shieldTimer--;
  if (player.rapidTimer > 0) {
    player.rapidTimer--;
    player.shootInterval = 4;
  } else {
    player.shootInterval = player.baseShootInterval;
  }
  if (player.speedTimer > 0) player.speedTimer--;
  if (player.invincibleTimer > 0) player.invincibleTimer--;

  // Update badges
  document.getElementById('badge-rapid').style.opacity = player.rapidTimer > 0 ? '1' : '0';
  document.getElementById('badge-shield').style.opacity = player.shieldTimer > 0 ? '1' : '0';
  document.getElementById('badge-speed').style.opacity = player.speedTimer > 0 ? '1' : '0';

  // Auto-shoot toward nearest enemy
  player.shootTimer--;
  if (player.shootTimer <= 0 && enemies.length > 0) {
    let nearest = null, nearDist = Infinity;
    for (const e of enemies) {
      const d = Math.hypot(e.x - player.x, e.y - player.y);
      if (d < nearDist) { nearDist = d; nearest = e; }
    }
    if (nearest) {
      const angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
      player.angle = angle;
      spawnBullet(player.x, player.y, angle);
      player.shootTimer = player.shootInterval;
    }
  }

  // Also shoot on spacebar press (toward nearest or upward)
  if (keys[' '] && player.shootTimer <= 0) {
    let angle = -Math.PI / 2; // Default: up
    if (enemies.length > 0) {
      let nearest = null, nearDist = Infinity;
      for (const e of enemies) {
        const d = Math.hypot(e.x - player.x, e.y - player.y);
        if (d < nearDist) { nearDist = d; nearest = e; }
      }
      if (nearest) angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
    }
    player.angle = angle;
    spawnBullet(player.x, player.y, angle);
    player.shootTimer = player.shootInterval;
  }

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      bullets.splice(i, 1);
    }
  }

  // Spawn enemies
  if (!betweenWaves && waveEnemiesToSpawn > 0) {
    waveSpawnTimer--;
    const spawnRate = Math.max(10, 40 - wave * 2);
    if (waveSpawnTimer <= 0) {
      spawnEnemy(getEnemyTypeForWave());
      waveEnemiesToSpawn--;
      waveSpawnTimer = spawnRate;
    }
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const dx2 = player.x - e.x;
    const dy2 = player.y - e.y;
    const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
    const nx = dx2 / dist;
    const ny = dy2 / dist;

    if (e.type === 'runner') {
      e.zigTimer++;
      if (e.zigTimer > 30) { e.zigDir *= -1; e.zigTimer = 0; }
      e.x += (nx + ny * e.zigDir * 0.6) * e.speed;
      e.y += (ny - nx * e.zigDir * 0.6) * e.speed;
    } else {
      e.x += nx * e.speed;
      e.y += ny * e.speed;
    }

    if (e.damageFlash > 0) e.damageFlash--;

    // Enemy-player collision
    if (dist < player.size + e.size) {
      if (player.invincibleTimer <= 0) {
        if (player.shieldTimer > 0) {
          player.shieldTimer = 0;
          spawnParticles(player.x, player.y, '#4488ff', 15, 4, 30);
          playSound('hit');
        } else {
          const dmg = e.type === 'tank' ? 25 : e.type === 'runner' ? 10 : 15;
          player.hp -= dmg;
          player.invincibleTimer = 30;
          spawnParticles(player.x, player.y, '#ff4444', 10, 3, 20);
          playSound('damage');

          // Health bar
          const pct = Math.max(0, player.hp / player.maxHp) * 100;
          document.getElementById('health-bar').style.width = pct + '%';
          if (pct < 30) {
            document.getElementById('health-bar').style.background = 'linear-gradient(90deg, #ff0000, #ff2222)';
          } else if (pct < 60) {
            document.getElementById('health-bar').style.background = 'linear-gradient(90deg, #ff8800, #ffaa44)';
          }

          if (player.hp <= 0) {
            gameOver();
            return;
          }
        }
      }
      // Push enemy back a bit
      e.x -= nx * 20;
      e.y -= ny * 20;
    }

    // Bullet-enemy collision
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.size + b.size) {
        e.hp -= b.damage;
        e.damageFlash = 6;
        bullets.splice(j, 1);
        spawnParticles(e.x, e.y, e.color, 5, 3, 15);
        playSound('hit');

        if (e.hp <= 0) {
          score += e.score;
          document.getElementById('score-display').textContent = score;
          spawnParticles(e.x, e.y, e.color, 20, 5, 30);
          spawnFloatingText(e.x, e.y - 20, '+' + e.score, '#ffd700');
          spawnPowerup(e.x, e.y);
          playSound('explosion');
          enemies.splice(i, 1);
          waveEnemiesLeft--;

          // Check wave complete
          if (waveEnemiesLeft <= 0 && waveEnemiesToSpawn <= 0) {
            betweenWaves = true;
            betweenWaveTimer = 120; // 2 second break
          }
          break;
        }
      }
    }
  }

  // Between waves countdown
  if (betweenWaves) {
    betweenWaveTimer--;
    if (betweenWaveTimer <= 0) {
      // Heal a bit between waves
      player.hp = Math.min(player.maxHp, player.hp + 20);
      const pct = (player.hp / player.maxHp) * 100;
      document.getElementById('health-bar').style.width = pct + '%';
      if (pct >= 60) {
        document.getElementById('health-bar').style.background = 'linear-gradient(90deg, #ff4444, #ff6b6b)';
      } else if (pct >= 30) {
        document.getElementById('health-bar').style.background = 'linear-gradient(90deg, #ff8800, #ffaa44)';
      }
      startWave(wave + 1);
    }
  }

  // Update power-ups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.life--;
    p.bobTimer += 0.08;
    if (p.life <= 0) { powerups.splice(i, 1); continue; }

    // Pickup
    if (Math.hypot(p.x - player.x, p.y - player.y) < player.size + p.size) {
      switch (p.type) {
        case 'rapid': player.rapidTimer = 300; break; // 5 seconds
        case 'shield': player.shieldTimer = 600; break; // 10 seconds
        case 'speed': player.speedTimer = 300; break; // 5 seconds
      }
      spawnParticles(p.x, p.y, POWERUP_COLORS[p.type], 12, 3, 25);
      spawnFloatingText(p.x, p.y - 20, POWERUP_ICONS[p.type] + ' ' + p.type.toUpperCase(), POWERUP_COLORS[p.type]);
      playSound('powerup');
      powerups.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const t = floatingTexts[i];
    t.y += t.vy;
    t.life -= 0.02;
    if (t.life <= 0) floatingTexts.splice(i, 1);
  }

  // Grid scroll
  gridOffset = (gridOffset + 0.5) % 40;
}

// --- Rendering ---
function draw() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    ctx.fillStyle = `rgba(255, 255, 255, ${s.brightness})`;
    ctx.fillRect(s.x % W, s.y % H, s.size, s.size);
  }

  // Grid floor
  ctx.strokeStyle = 'rgba(100, 100, 255, 0.06)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = gridOffset; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Power-ups
  for (const p of powerups) {
    const bob = Math.sin(p.bobTimer) * 4;
    const alpha = p.life < 120 ? (Math.sin(p.life * 0.3) * 0.3 + 0.7) : 1;
    ctx.globalAlpha = alpha;

    // Glow
    ctx.beginPath();
    ctx.arc(p.x, p.y + bob, p.size + 6, 0, Math.PI * 2);
    ctx.fillStyle = POWERUP_COLORS[p.type] + '33';
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.arc(p.x, p.y + bob, p.size, 0, Math.PI * 2);
    ctx.fillStyle = POWERUP_COLORS[p.type];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Icon
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(POWERUP_ICONS[p.type], p.x, p.y + bob);

    ctx.globalAlpha = 1;
  }

  // Enemies
  for (const e of enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);

    // Flash white on damage
    const color = e.damageFlash > 0 ? '#ffffff' : e.color;
    const bodyColor = e.damageFlash > 0 ? '#dddddd' : e.bodyColor;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(2, e.size * 0.7, e.size * 0.8, e.size * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    if (e.type === 'grunt') {
      // Round body
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.arc(0, 0, e.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(0, 0, e.size * 0.75, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-6, -4, 5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(6, -4, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-5, -3, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(7, -3, 2.5, 0, Math.PI * 2); ctx.fill();
      // Angry mouth
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-5, 6); ctx.lineTo(0, 4); ctx.lineTo(5, 6); ctx.stroke();
    } else if (e.type === 'runner') {
      // Triangle body
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.moveTo(0, -e.size);
      ctx.lineTo(-e.size * 0.8, e.size * 0.6);
      ctx.lineTo(e.size * 0.8, e.size * 0.6);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, -e.size * 0.7);
      ctx.lineTo(-e.size * 0.5, e.size * 0.4);
      ctx.lineTo(e.size * 0.5, e.size * 0.4);
      ctx.closePath();
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-4, -1, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, -1, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-3, 0, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, 0, 2, 0, Math.PI * 2); ctx.fill();
    } else if (e.type === 'tank') {
      // Square body
      const s = e.size;
      ctx.fillStyle = bodyColor;
      roundRect(ctx, -s, -s, s * 2, s * 2, 8);
      ctx.fill();
      ctx.fillStyle = color;
      roundRect(ctx, -s * 0.75, -s * 0.75, s * 1.5, s * 1.5, 6);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-8, -6, 6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(8, -6, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(-7, -5, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(9, -5, 3, 0, Math.PI * 2); ctx.fill();
      // Angry brows
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(-14, -14); ctx.lineTo(-4, -10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(14, -14); ctx.lineTo(4, -10); ctx.stroke();
      // HP bar
      ctx.fillStyle = '#333';
      roundRect(ctx, -s, -s - 10, s * 2, 6, 3);
      ctx.fill();
      ctx.fillStyle = e.hp / e.maxHp > 0.5 ? '#44ff44' : e.hp / e.maxHp > 0.25 ? '#ffaa00' : '#ff4444';
      roundRect(ctx, -s, -s - 10, s * 2 * (e.hp / e.maxHp), 6, 3);
      ctx.fill();
    }

    ctx.restore();
  }

  // Bullets
  for (const b of bullets) {
    // Trail
    ctx.fillStyle = 'rgba(0, 212, 255, 0.3)';
    ctx.beginPath();
    ctx.arc(b.x - b.vx * 0.5, b.y - b.vy * 0.5, b.size + 2, 0, Math.PI * 2);
    ctx.fill();
    // Bullet
    ctx.fillStyle = '#00d4ff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Player
  ctx.save();
  ctx.translate(player.x, player.y);

  // Shield visual
  if (player.shieldTimer > 0) {
    const shieldAlpha = player.shieldTimer < 120 ? (Math.sin(player.shieldTimer * 0.2) * 0.2 + 0.3) : 0.4;
    ctx.strokeStyle = `rgba(68, 136, 255, ${shieldAlpha})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, player.size + 10, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = `rgba(68, 136, 255, ${shieldAlpha * 0.3})`;
    ctx.fill();
  }

  // Speed visual
  if (player.speedTimer > 0) {
    ctx.fillStyle = 'rgba(68, 255, 68, 0.2)';
    ctx.beginPath();
    ctx.arc(0, 8, player.size * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }

  // Flash when invincible
  if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 3) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(2, player.size * 0.6, player.size * 0.8, player.size * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (a cool character shape)
  ctx.fillStyle = '#0066cc';
  ctx.beginPath();
  ctx.arc(0, 0, player.size, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#00aaff';
  ctx.beginPath();
  ctx.arc(0, 0, player.size * 0.78, 0, Math.PI * 2);
  ctx.fill();

  // Inner highlight
  ctx.fillStyle = '#33ccff';
  ctx.beginPath();
  ctx.arc(-4, -5, player.size * 0.35, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-7, -5, 6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -5, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-6, -4, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, -4, 3, 0, Math.PI * 2); ctx.fill();

  // Determined mouth
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 2, 5, 0.1, Math.PI - 0.1);
  ctx.stroke();

  // Gun indicator (direction)
  const gunLen = player.size + 8;
  ctx.strokeStyle = player.rapidTimer > 0 ? '#ff4444' : '#00d4ff';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(Math.cos(player.angle) * player.size * 0.5, Math.sin(player.angle) * player.size * 0.5);
  ctx.lineTo(Math.cos(player.angle) * gunLen, Math.sin(player.angle) * gunLen);
  ctx.stroke();

  // Gun tip glow
  ctx.fillStyle = player.rapidTimer > 0 ? '#ff6666' : '#66ddff';
  ctx.beginPath();
  ctx.arc(Math.cos(player.angle) * gunLen, Math.sin(player.angle) * gunLen, 4, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Floating texts
  for (const t of floatingTexts) {
    ctx.globalAlpha = t.life;
    ctx.fillStyle = t.color;
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
  }
  ctx.globalAlpha = 1;

  // Between waves message
  if (betweenWaves && betweenWaveTimer > 0) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GET READY...', W / 2, H / 2);
  }
}

function roundRect(ctx2, x, y, w, h, r) {
  ctx2.beginPath();
  ctx2.moveTo(x + r, y);
  ctx2.lineTo(x + w - r, y);
  ctx2.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx2.lineTo(x + w, y + h - r);
  ctx2.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx2.lineTo(x + r, y + h);
  ctx2.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx2.lineTo(x, y + r);
  ctx2.quadraticCurveTo(x, y, x + r, y);
  ctx2.closePath();
}

// --- Game Flow ---
function gameOver() {
  gameRunning = false;
  playSound('gameover');
  document.getElementById('final-score').textContent = 'Score: ' + score;
  document.getElementById('final-wave').textContent = 'Reached Wave ' + wave;
  document.getElementById('game-over').style.display = 'flex';
}

function startGame() {
  ensureAudio();
  score = 0;
  wave = 0;
  bullets.length = 0;
  enemies.length = 0;
  powerups.length = 0;
  particles.length = 0;
  floatingTexts.length = 0;
  touchTarget = null;

  document.getElementById('score-display').textContent = '0';
  document.getElementById('health-bar').style.width = '100%';
  document.getElementById('health-bar').style.background = 'linear-gradient(90deg, #ff4444, #ff6b6b)';
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('start-screen').style.display = 'none';

  resetPlayer();
  gameRunning = true;
  startWave(1);
}

// --- Game Loop ---
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// --- Event Handlers ---
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('start-btn').addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });
document.getElementById('play-again').addEventListener('click', startGame);
document.getElementById('play-again').addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });

// Start the loop
loop();
</script>
