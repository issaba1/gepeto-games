<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏁 Jetski Grand Prix</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a1628; overflow:hidden; touch-action:none; user-select:none; font-family:system-ui,sans-serif; }
canvas { display:block; }
#back-btn { position:fixed; top:12px; left:12px; z-index:9999; background:rgba(0,0,0,0.7); color:#00d4ff; border:2px solid #00d4ff; border-radius:50px; padding:8px 16px; font-size:16px; font-weight:800; cursor:pointer; text-decoration:none; }
#dpad { position:fixed; bottom:20px; left:20px; z-index:100; display:grid; grid-template-columns:65px 65px 65px; grid-template-rows:65px 65px 65px; gap:4px; }
.dpad-btn { background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.4); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; touch-action:none; -webkit-user-select:none; user-select:none; }
.dpad-btn:active, .dpad-btn.pressed { background:rgba(255,255,255,0.4); }
#boost-btn { position:fixed; bottom:30px; right:30px; z-index:100; width:85px; height:85px; border-radius:50%; background:radial-gradient(circle,#ffd700,#ff8c00); border:3px solid #fff; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; color:#000; cursor:pointer; box-shadow:0 0 20px #ffd700; touch-action:none; }
</style>
</head>
<body>
<a id="back-btn" href="index.html">🏠 Arcade</a>

<div id="dpad">
  <div></div>
  <div class="dpad-btn" id="btn-up">⬆️</div>
  <div></div>
  <div class="dpad-btn" id="btn-left">⬅️</div>
  <div></div>
  <div class="dpad-btn" id="btn-right">➡️</div>
  <div></div>
  <div class="dpad-btn" id="btn-down">⬇️</div>
  <div></div>
</div>

<div id="boost-btn">⚡BOOST</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
const W = window.innerWidth, H = window.innerHeight;

// Waypoints for S-curve track
const WAYPOINTS = [
  {x:W*0.5, y:H*0.15},
  {x:W*0.8, y:H*0.2},
  {x:W*0.85, y:H*0.4},
  {x:W*0.7, y:H*0.55},
  {x:W*0.5, y:H*0.5},
  {x:W*0.3, y:H*0.45},
  {x:W*0.15, y:H*0.6},
  {x:W*0.2, y:H*0.8},
  {x:W*0.5, y:H*0.85},
  {x:W*0.8, y:H*0.8},
  {x:W*0.85, y:H*0.6},
];

class RaceScene extends Phaser.Scene {
  constructor() { super('RaceScene'); }

  create() {
    this.keys = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys('W,A,S,D,SPACE');
    this.boost = false;
    this.boostTimer = 0;
    this.countdown = 3;
    this.countdownTimer = 0;
    this.racing = false;
    this.finished = false;

    // Draw background
    const bg = this.add.graphics();
    // Sky gradient
    for(let y=0; y<H; y++) {
      const t = y/H;
      const r = Math.floor(Phaser.Math.Linear(45, 10, t));
      const g = Math.floor(Phaser.Math.Linear(20, 22, t));
      const b = Math.floor(Phaser.Math.Linear(105, 40, t));
      bg.fillStyle(Phaser.Display.Color.GetColor(r,g,b));
      bg.fillRect(0,y,W,1);
    }

    // Draw water (animated)
    this.water = this.add.graphics();
    this.waveOffset = 0;

    // Draw track
    this.trackGfx = this.add.graphics();
    this.drawTrack();

    // Palm trees
    this.drawPalms();

    // Finish line
    this.drawFinishLine();

    // Buoys
    this.buoyGfx = this.add.graphics();
    this.drawBuoys();

    // Create boats
    this.player = this.createBoat(WAYPOINTS[0].x - 30, WAYPOINTS[0].y, 0xffffff, 0x0088ff);
    this.ai1 = this.createBoat(WAYPOINTS[0].x - 10, WAYPOINTS[0].y + 20, 0xff2200, 0xff6600);
    this.ai2 = this.createBoat(WAYPOINTS[0].x + 10, WAYPOINTS[0].y - 20, 0x0044ff, 0x00ccff);
    this.ai3 = this.createBoat(WAYPOINTS[0].x + 30, WAYPOINTS[0].y + 40, 0x00cc00, 0x88ff00);

    this.aiBoats = [
      {gfx: this.ai1, wp: 0, progress: 0, speed: 2.8, lap: 0, name: 'RED ROCKET', color: 0xff2200},
      {gfx: this.ai2, wp: 0, progress: 0, speed: 3.0, lap: 0, name: 'BLUE THUNDER', color: 0x0044ff},
      {gfx: this.ai3, wp: 0, progress: 0, speed: 2.6, lap: 0, name: 'GREEN FLASH', color: 0x00cc00},
    ];

    this.playerState = { wp: 0, progress: 0, lap: 0, angle: 0, speed: 0, vx: 0, vy: 0 };

    // Wake particles
    this.wakes = [];
    this.boostParticles = [];

    // HUD
    this.posText = this.add.text(16, 16, '🥇 1st', {fontSize:'28px', fontStyle:'bold', color:'#ffd700', stroke:'#000', strokeThickness:4}).setDepth(10);
    this.lapText = this.add.text(W-16, 16, 'LAP 1/3', {fontSize:'24px', fontStyle:'bold', color:'#fff', stroke:'#000', strokeThickness:3}).setDepth(10).setOrigin(1,0);
    this.countdownText = this.add.text(W/2, H/2, '3', {fontSize:'120px', fontStyle:'bold', color:'#ff0', stroke:'#000', strokeThickness:8}).setDepth(10).setOrigin(0.5);
    this.speedBar = this.add.graphics().setDepth(10);

    // Input for boost
    this.input.keyboard.on('keydown-SPACE', () => { this.activateBoost(); });
    document.getElementById('boost-btn').addEventListener('touchstart', (e) => { e.preventDefault(); this.activateBoost(); });
    document.getElementById('boost-btn').addEventListener('mousedown', () => { this.activateBoost(); });

    // D-pad
    ['up','down','left','right'].forEach(dir => {
      const el = document.getElementById('btn-' + dir);
      el.addEventListener('touchstart', e => { e.preventDefault(); this.dpad = this.dpad || {}; this.dpad[dir] = true; el.classList.add('pressed'); });
      el.addEventListener('touchend', e => { e.preventDefault(); this.dpad[dir] = false; el.classList.remove('pressed'); });
      el.addEventListener('mousedown', () => { this.dpad = this.dpad || {}; this.dpad[dir] = true; });
      el.addEventListener('mouseup', () => { this.dpad[dir] = false; });
    });
    this.dpad = {};
  }

  createBoat(x, y, mainColor, accentColor) {
    const g = this.add.graphics();
    this.drawBoatShape(g, 0, 0, mainColor, accentColor);
    g.x = x; g.y = y;
    g._mc = mainColor; g._ac = accentColor;
    return g;
  }

  drawBoatShape(g, x, y, mc, ac) {
    g.clear();
    // Main body
    g.fillStyle(mc);
    g.fillTriangle(x+25,y, x-20,y-12, x-20,y+12);
    g.fillRect(x-20,y-10, 30, 20);
    // Accent stripe
    g.fillStyle(ac);
    g.fillRect(x-15,y-4, 25, 8);
    // Cockpit
    g.fillStyle(0x333333);
    g.fillEllipse(x+5, y, 14, 10);
    // Shadow
    g.fillStyle(0x000000, 0.2);
    g.fillEllipse(x, y+14, 40, 8);
  }

  drawTrack() {
    const g = this.trackGfx;
    g.clear();
    // Draw track as thick path
    g.lineStyle(80, 0x00aadd, 1);
    g.beginPath();
    g.moveTo(WAYPOINTS[0].x, WAYPOINTS[0].y);
    for(let i=1; i<WAYPOINTS.length; i++) {
      g.lineTo(WAYPOINTS[i].x, WAYPOINTS[i].y);
    }
    g.lineTo(WAYPOINTS[0].x, WAYPOINTS[0].y);
    g.strokePath();
    // Track edges
    g.lineStyle(4, 0xffffff, 0.6);
    g.beginPath();
    g.moveTo(WAYPOINTS[0].x, WAYPOINTS[0].y);
    for(let i=1; i<WAYPOINTS.length; i++) {
      g.lineTo(WAYPOINTS[i].x, WAYPOINTS[i].y);
    }
    g.lineTo(WAYPOINTS[0].x, WAYPOINTS[0].y);
    g.strokePath();
  }

  drawPalms() {
    const g = this.add.graphics();
    const palmSpots = [
      {x:W*0.5, y:H*0.5}, {x:W*0.3,y:H*0.5}, {x:W*0.65,y:H*0.5}
    ];
    palmSpots.forEach(p => {
      g.fillStyle(0x8B4513); g.fillRect(p.x-5, p.y-40, 10, 40);
      g.fillStyle(0x228B22); g.fillCircle(p.x, p.y-45, 22);
      g.fillStyle(0x32CD32); g.fillCircle(p.x-10, p.y-50, 14);
      g.fillStyle(0x32CD32); g.fillCircle(p.x+10, p.y-50, 14);
    });
  }

  drawFinishLine() {
    const g = this.add.graphics();
    const fx = WAYPOINTS[0].x, fy = WAYPOINTS[0].y;
    for(let i=0; i<8; i++) {
      g.fillStyle(i%2===0 ? 0xffffff : 0x000000);
      g.fillRect(fx-40+i*10, fy-5, 10, 10);
    }
  }

  drawBuoys() {
    const g = this.buoyGfx;
    g.clear();
    WAYPOINTS.forEach(wp => {
      g.fillStyle(0xffffff, 0.3); g.fillCircle(wp.x, wp.y, 16);
      g.fillStyle(0xffdd00); g.fillCircle(wp.x, wp.y, 12);
      g.fillStyle(0xff0000); g.fillCircle(wp.x, wp.y, 5);
    });
  }

  activateBoost() {
    if(!this.racing) return;
    this.boost = true;
    this.boostTimer = 120;
  }

  update(time, delta) {
    // Animated water
    this.waveOffset += 0.5;
    this.water.clear();
    for(let i=0; i<8; i++) {
      const x = ((i * 150 + this.waveOffset * 2) % (W + 150)) - 150;
      this.water.lineStyle(2, 0x00ccff, 0.3);
      this.water.beginPath();
      this.water.moveTo(x, 0);
      this.water.lineTo(x + 100, H);
      this.water.strokePath();
    }

    // Countdown
    if(!this.racing && !this.finished) {
      this.countdownTimer += delta;
      if(this.countdownTimer > 1000) {
        this.countdownTimer = 0;
        this.countdown--;
        if(this.countdown <= 0) {
          this.countdownText.setText('GO! 🏁');
          this.countdownText.setColor('#00ff44');
          this.time.delayedCall(600, () => { this.countdownText.setVisible(false); this.racing = true; });
        } else {
          this.countdownText.setText(String(this.countdown));
          const colors = ['','#ff4444','#ffaa00','#ffff00'];
          this.countdownText.setColor(colors[this.countdown] || '#fff');
        }
      }
      return;
    }

    if(this.finished) return;

    // Player movement
    const ps = this.playerState;
    const turnSpeed = 0.04;
    const maxSpeed = this.boost ? 6 : 3.5;
    const accel = 0.12;
    const friction = 0.96;

    if(this.keys.left.isDown || this.wasd.A.isDown || this.dpad.left) ps.angle -= turnSpeed;
    if(this.keys.right.isDown || this.wasd.D.isDown || this.dpad.right) ps.angle += turnSpeed;
    if(this.keys.up.isDown || this.wasd.W.isDown || this.dpad.up) {
      ps.speed = Math.min(ps.speed + accel, maxSpeed);
    } else if(this.keys.down.isDown || this.wasd.S.isDown || this.dpad.down) {
      ps.speed = Math.max(ps.speed - accel, 0);
    } else {
      ps.speed *= friction;
    }

    ps.vx = Math.cos(ps.angle) * ps.speed;
    ps.vy = Math.sin(ps.angle) * ps.speed;
    this.player.x += ps.vx;
    this.player.y += ps.vy;
    this.player.rotation = ps.angle;

    // Boost timer
    if(this.boostTimer > 0) {
      this.boostTimer--;
      if(this.boostTimer <= 0) this.boost = false;
      // Boost particles
      if(Math.random() < 0.6) {
        this.boostParticles.push({x:this.player.x - Math.cos(ps.angle)*25, y:this.player.y - Math.sin(ps.angle)*25, life:20, vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2});
      }
    }

    // Wake particles
    if(ps.speed > 0.5) {
      this.wakes.push({x:this.player.x, y:this.player.y, life:15, alpha:0.6});
    }

    // Draw wakes
    const wakeGfx = this.add.graphics();
    this.wakes = this.wakes.filter(w => { w.life--; return w.life > 0; });
    this.boostParticles = this.boostParticles.filter(p => { p.life--; p.x+=p.vx; p.y+=p.vy; return p.life > 0; });

    // Redraw boat with tilt
    this.drawBoatShape(this.player, 0, 0, this.player._mc, this.player._ac);

    // AI movement
    this.aiBoats.forEach(ai => {
      const target = WAYPOINTS[ai.wp % WAYPOINTS.length];
      const dx = target.x - ai.gfx.x;
      const dy = target.y - ai.gfx.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 30) {
        ai.wp++;
        if(ai.wp >= WAYPOINTS.length) { ai.wp = 0; ai.lap++; }
      }
      const angle = Math.atan2(dy, dx);
      const spd = ai.speed + (ps.speed < 1 ? 0.5 : 0);
      ai.gfx.x += Math.cos(angle) * spd;
      ai.gfx.y += Math.sin(angle) * spd;
      ai.gfx.rotation = angle;
      if(Math.random() < 0.3) this.wakes.push({x:ai.gfx.x, y:ai.gfx.y, life:12, alpha:0.4});
    });

    // Check lap progress
    const fpDist = Phaser.Math.Distance.Between(this.player.x, this.player.y, WAYPOINTS[0].x, WAYPOINTS[0].y);
    // Simple lap check: if near waypoints, advance
    const nextWP = WAYPOINTS[ps.wp % WAYPOINTS.length];
    const wpDist = Phaser.Math.Distance.Between(this.player.x, this.player.y, nextWP.x, nextWP.y);
    if(wpDist < 40) {
      ps.wp++;
      if(ps.wp >= WAYPOINTS.length) {
        ps.wp = 0;
        ps.lap++;
        if(ps.lap >= 3) { this.finishRace(true); return; }
        this.lapText.setText('LAP ' + (ps.lap+1) + '/3');
      }
    }

    // Check if AI won
    const aiLaps = this.aiBoats.map(a => a.lap);
    if(Math.max(...aiLaps) >= 3) { this.finishRace(false); return; }

    // Update position HUD
    const myProgress = ps.lap * 100 + ps.wp;
    const aiProgresses = this.aiBoats.map(a => a.lap * 100 + a.wp);
    const pos = 1 + aiProgresses.filter(p => p > myProgress).length;
    const medals = ['','🥇','🥈','🥉','4th'];
    this.posText.setText(medals[pos] + ' ' + ['','1st','2nd','3rd','4th'][pos]);

    // Speed bar
    this.speedBar.clear();
    this.speedBar.fillStyle(0x000000, 0.5);
    this.speedBar.fillRoundedRect(W/2-75, H-30, 150, 16, 8);
    this.speedBar.fillStyle(this.boost ? 0xff8800 : 0x00ff88);
    this.speedBar.fillRoundedRect(W/2-73, H-28, (ps.speed/6)*146, 12, 6);
  }

  finishRace(won) {
    this.finished = true;
    this.racing = false;
    const overlay = this.add.graphics().setDepth(20);
    overlay.fillStyle(0x000000, 0.75);
    overlay.fillRect(0, 0, W, H);

    const msg = won ? '🏆 YOU WIN!' : '😢 YOU LOST!';
    const col = won ? '#ffd700' : '#ff6666';
    this.add.text(W/2, H/2-80, msg, {fontSize:'52px', fontStyle:'bold', color:col, stroke:'#000', strokeThickness:6}).setDepth(21).setOrigin(0.5);

    if(won) {
      // Fireworks
      for(let i=0; i<5; i++) {
        this.time.delayedCall(i*200, () => {
          const fx = Math.random()*W, fy = Math.random()*H*0.6;
          for(let j=0; j<12; j++) {
            const a = (j/12)*Math.PI*2;
            const speed = 3+Math.random()*3;
            this.boostParticles.push({x:fx, y:fy, life:40, vx:Math.cos(a)*speed, vy:Math.sin(a)*speed});
          }
        });
      }
    }

    // Restart button
    const restartBtn = this.add.text(W/2, H/2+20, '▶ PLAY AGAIN', {fontSize:'28px', fontStyle:'bold', color:'#fff', backgroundColor:'#00aa44', padding:{x:20,y:10}}).setDepth(21).setOrigin(0.5).setInteractive({useHandCursor:true});
    restartBtn.on('pointerdown', () => { this.scene.restart(); });

    const menuBtn = this.add.text(W/2, H/2+90, '🏠 Main Menu', {fontSize:'22px', color:'#00d4ff', stroke:'#000', strokeThickness:3}).setDepth(21).setOrigin(0.5).setInteractive({useHandCursor:true});
    menuBtn.on('pointerdown', () => { window.location.href='index.html'; });
  }
}

const config = {
  type: Phaser.AUTO,
  width: W,
  height: H,
  backgroundColor: '#0a1628',
  scene: RaceScene,
  parent: document.body,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
};

new Phaser.Game(config);
</script>
</body>
</html>
