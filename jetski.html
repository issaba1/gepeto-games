<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏄 Jetski Racer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
    user-select: none;
  }
  canvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    border: 2px solid #00d4ff44;
    border-radius: 12px;
  }
  #back-btn {
    position: fixed;
    top: 12px; left: 12px;
    background: #00d4ff22;
    border: 1px solid #00d4ff55;
    color: #00d4ff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    z-index: 100;
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>
<body>
<a href="index.html" id="back-btn">← LOBBY</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Responsive canvas
function resize() {
  const maxW = Math.min(window.innerWidth, 480);
  const maxH = window.innerHeight - 20;
  canvas.width = maxW;
  canvas.height = Math.min(maxH, maxW * 1.6);
}
resize();
window.addEventListener('resize', resize);

const W = () => canvas.width;
const H = () => canvas.height;

// Game state
let state = 'start'; // start | playing | dead
let score = 0;
let bestScore = parseInt(localStorage.getItem('jetski_best') || '0');
let frameCount = 0;
let speed = 3;
let obstacles = [];
let particles = [];
let waveOffset = 0;
let jumpVel = 0;
let player = { x: 0, y: 0, vy: 0, onGround: true };

function resetGame() {
  score = 0;
  frameCount = 0;
  speed = 3;
  obstacles = [];
  particles = [];
  player = {
    x: W() * 0.2,
    y: H() * 0.65,
    vy: 0,
    onGround: true,
    bobPhase: 0
  };
  state = 'playing';
}

function getGroundY() {
  return H() * 0.68;
}

function jump() {
  if (state === 'start') { resetGame(); return; }
  if (state === 'dead') { resetGame(); return; }
  if (player.onGround) {
    player.vy = -H() * 0.022;
    player.onGround = false;
    // Splash particles
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: player.x,
        y: getGroundY(),
        vx: (Math.random() - 0.5) * 4,
        vy: -(Math.random() * 3 + 1),
        life: 1,
        color: '#00d4ff'
      });
    }
  }
}

// Input
window.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); } });
canvas.addEventListener('pointerdown', e => { e.preventDefault(); jump(); });

function spawnObstacle() {
  const types = ['rock', 'wave', 'buoy'];
  const type = types[Math.floor(Math.random() * types.length)];
  const h = type === 'wave' ? H() * 0.12 : (type === 'rock' ? H() * 0.09 : H() * 0.08);
  obstacles.push({
    x: W() + 40,
    y: getGroundY() - h + 4,
    w: type === 'wave' ? W() * 0.06 : W() * 0.04,
    h: h,
    type,
    color: type === 'rock' ? '#778899' : (type === 'wave' ? '#00aaff' : '#ff4444')
  });
}

function update() {
  if (state !== 'playing') return;

  frameCount++;
  score = Math.floor(frameCount / 60);
  speed = 3 + score * 0.15;
  waveOffset += speed * 0.5;

  // Player physics
  const gY = getGroundY();
  player.vy += H() * 0.0012; // gravity
  player.y += player.vy;
  if (player.y >= gY) {
    player.y = gY;
    player.vy = 0;
    player.onGround = true;
  } else {
    player.onGround = false;
  }
  player.bobPhase += 0.1;

  // Spawn obstacles
  const spawnRate = Math.max(60, 120 - score * 2);
  if (frameCount % spawnRate === 0) spawnObstacle();

  // Move obstacles
  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x > -60);

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.05;
  });
  particles = particles.filter(p => p.life > 0);

  // Collision
  const px = player.x;
  const py = player.y;
  const pr = W() * 0.035;
  for (const o of obstacles) {
    if (px + pr > o.x + 4 && px - pr < o.x + o.w - 4 && py > o.y + 4 && py - pr * 1.5 < o.y + o.h) {
      if (score > bestScore) { bestScore = score; localStorage.setItem('jetski_best', bestScore); }
      state = 'dead';
      // Explosion
      for (let i = 0; i < 20; i++) {
        particles.push({ x: px, y: py, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, color: Math.random()>0.5?'#ffd700':'#ff4400' });
      }
      return;
    }
  }
}

function drawWater() {
  const gY = getGroundY();
  // Deep water
  const grad = ctx.createLinearGradient(0, gY, 0, H());
  grad.addColorStop(0, '#003366');
  grad.addColorStop(1, '#001122');
  ctx.fillStyle = grad;
  ctx.fillRect(0, gY, W(), H() - gY);

  // Wave lines
  ctx.strokeStyle = '#00d4ff44';
  ctx.lineWidth = 1.5;
  for (let row = 0; row < 4; row++) {
    ctx.beginPath();
    for (let x = -20; x < W() + 20; x += 8) {
      const y = gY + row * 12 + Math.sin((x + waveOffset + row * 30) * 0.05) * 3;
      x === -20 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, getGroundY());
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(1, '#0d2244');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W(), getGroundY());

  // Sun/moon
  ctx.beginPath();
  ctx.arc(W() * 0.8, H() * 0.12, W() * 0.06, 0, Math.PI * 2);
  ctx.fillStyle = '#ffd70033';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(W() * 0.8, H() * 0.12, W() * 0.04, 0, Math.PI * 2);
  ctx.fillStyle = '#ffd700aa';
  ctx.fill();
}

function drawPlayer() {
  const bob = player.onGround ? Math.sin(player.bobPhase) * 2 : 0;
  const px = player.x;
  const py = player.y + bob;
  const s = W() * 0.07;

  ctx.save();
  ctx.translate(px, py);

  // Jetski body
  ctx.fillStyle = '#00d4ff';
  ctx.beginPath();
  ctx.ellipse(0, 0, s, s * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();

  // Jetski nose
  ctx.fillStyle = '#0090cc';
  ctx.beginPath();
  ctx.moveTo(s * 0.7, -s * 0.1);
  ctx.lineTo(s * 1.2, 0);
  ctx.lineTo(s * 0.7, s * 0.1);
  ctx.closePath();
  ctx.fill();

  // Rider (stick figure ish)
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.ellipse(s * 0.1, -s * 0.5, s * 0.12, s * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = s * 0.1;
  ctx.beginPath();
  ctx.moveTo(s * 0.1, -s * 0.35);
  ctx.lineTo(s * 0.1, -s * 0.05);
  ctx.stroke();

  // Wake spray
  if (player.onGround) {
    ctx.strokeStyle = '#00d4ff66';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(-s * 0.8, i * 4 - s * 0.1);
      ctx.lineTo(-s * 1.4, i * 6 - s * 0.3);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawObstacles() {
  obstacles.forEach(o => {
    ctx.save();
    if (o.type === 'rock') {
      ctx.fillStyle = '#778899';
      ctx.beginPath();
      ctx.moveTo(o.x + o.w * 0.5, o.y);
      ctx.lineTo(o.x + o.w, o.y + o.h);
      ctx.lineTo(o.x, o.y + o.h);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#aabbcc44';
      ctx.fillRect(o.x + o.w * 0.2, o.y + o.h * 0.2, o.w * 0.2, o.h * 0.2);
    } else if (o.type === 'wave') {
      ctx.strokeStyle = '#00aaff';
      ctx.lineWidth = 4;
      ctx.beginPath();
      for (let x = 0; x <= o.w; x += 4) {
        const y = o.y + o.h - Math.sin(x / o.w * Math.PI) * o.h;
        x === 0 ? ctx.moveTo(o.x + x, y) : ctx.lineTo(o.x + x, y);
      }
      ctx.stroke();
      ctx.fillStyle = '#00aaff33';
      ctx.fill();
    } else {
      // buoy
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(o.x + o.w * 0.5, o.y + o.h * 0.5, o.w * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(o.x + o.w * 0.5, o.y + o.h * 0.5, o.w * 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawHUD() {
  ctx.fillStyle = '#00d4ff';
  ctx.font = `bold ${W() * 0.055}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`⏱ ${score}s`, 14, 36);
  ctx.fillStyle = '#ffd700';
  ctx.font = `${W() * 0.038}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText(`BEST: ${bestScore}s`, W() - 14, 36);
}

function drawScreen(title, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W(), H());
  ctx.textAlign = 'center';
  ctx.fillStyle = '#00d4ff';
  ctx.font = `bold ${W() * 0.09}px 'Segoe UI', sans-serif`;
  ctx.fillText(title, W() / 2, H() * 0.4);
  ctx.fillStyle = '#ffffff';
  ctx.font = `${W() * 0.05}px 'Segoe UI', sans-serif`;
  ctx.fillText(sub, W() / 2, H() * 0.52);
  ctx.fillStyle = '#ffd700';
  ctx.font = `${W() * 0.04}px 'Segoe UI', sans-serif`;
  ctx.fillText(`Best: ${bestScore}s`, W() / 2, H() * 0.62);
  ctx.fillStyle = '#00d4ff';
  ctx.fillRect(W() * 0.2, H() * 0.7, W() * 0.6, H() * 0.09);
  ctx.fillStyle = '#0a0a1a';
  ctx.font = `bold ${W() * 0.05}px 'Segoe UI', sans-serif`;
  ctx.fillText('▶  TAP TO PLAY', W() / 2, H() * 0.77);
}

function loop() {
  ctx.clearRect(0, 0, W(), H());
  update();
  drawSky();
  drawWater();
  drawObstacles();
  drawPlayer();
  drawParticles();
  if (state === 'playing') drawHUD();
  if (state === 'start') drawScreen('🏄 JETSKI', 'Tap / Space to jump');
  if (state === 'dead') drawScreen('💥 WIPEOUT!', `Score: ${score}s`);
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
