<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦈 Shark Dodge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
    user-select: none;
  }
  canvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    border: 2px solid #00d4ff44;
    border-radius: 12px;
  }
  #back-btn {
    position: fixed;
    top: 12px; left: 12px;
    background: #00d4ff22;
    border: 1px solid #00d4ff55;
    color: #00d4ff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    z-index: 100;
    text-decoration: none;
    font-weight: 700;
  }
</style>
</head>
<body>
<a href="index.html" id="back-btn">← LOBBY</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  const s = Math.min(window.innerWidth, window.innerHeight - 20, 500);
  canvas.width = s;
  canvas.height = s;
}
resize();
window.addEventListener('resize', resize);

const W = () => canvas.width;
const H = () => canvas.height;

let state = 'start';
let score = 0;
let bestScore = parseInt(localStorage.getItem('shark_best') || '0');
let frameCount = 0;
let sharks = [];
let particles = [];
let player = { x: 0, y: 0, r: 14, teleportCooldown: 0 };
let ripples = [];
let waveT = 0;

function resetGame() {
  score = 0;
  frameCount = 0;
  sharks = [];
  particles = [];
  ripples = [];
  player.x = W() / 2;
  player.y = H() / 2;
  player.teleportCooldown = 0;
  state = 'playing';
}

function spawnShark() {
  // Pick a random edge
  const edge = Math.floor(Math.random() * 4);
  let x, y, angle;
  if (edge === 0) { x = Math.random() * W(); y = -30; angle = Math.PI / 2 + (Math.random() - 0.5) * 1; }
  else if (edge === 1) { x = W() + 30; y = Math.random() * H(); angle = Math.PI + (Math.random() - 0.5) * 1; }
  else if (edge === 2) { x = Math.random() * W(); y = H() + 30; angle = -Math.PI / 2 + (Math.random() - 0.5) * 1; }
  else { x = -30; y = Math.random() * H(); angle = (Math.random() - 0.5) * 1; }

  // Target player
  const dx = player.x - x;
  const dy = player.y - y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const baseSpeed = 1.2 + score * 0.08;
  sharks.push({
    x, y,
    vx: (dx / dist) * baseSpeed,
    vy: (dy / dist) * baseSpeed,
    angle: Math.atan2(dy, dx),
    r: 18,
    wobble: Math.random() * Math.PI * 2,
    scored: false
  });
}

function teleport(tx, ty) {
  if (player.teleportCooldown > 0) return;
  // Make sure not too close to a shark
  const safe = sharks.every(s => {
    const dx = tx - s.x;
    const dy = ty - s.y;
    return Math.sqrt(dx * dx + dy * dy) > 60;
  });
  // Ripple at old pos
  ripples.push({ x: player.x, y: player.y, r: 0, maxR: 40, life: 1 });
  player.x = tx;
  player.y = ty;
  player.teleportCooldown = 12;
  // Ripple at new pos
  ripples.push({ x: tx, y: ty, r: 0, maxR: 40, life: 1 });
  // particles
  for (let i = 0; i < 10; i++) {
    particles.push({ x: tx, y: ty, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, life: 1, color: '#00d4ff' });
  }
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W() / rect.width;
  const scaleY = H() / rect.height;
  const tx = (e.clientX - rect.left) * scaleX;
  const ty = (e.clientY - rect.top) * scaleY;
  if (state === 'start' || state === 'dead') { resetGame(); return; }
  teleport(tx, ty);
});

function update() {
  if (state !== 'playing') return;
  frameCount++;
  waveT += 0.02;

  if (player.teleportCooldown > 0) player.teleportCooldown--;

  // Spawn sharks
  const spawnRate = Math.max(40, 100 - score * 3);
  if (frameCount % spawnRate === 0) spawnShark();

  // Move sharks toward player
  sharks.forEach(s => {
    const dx = player.x - s.x;
    const dy = player.y - s.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const speed = 1.2 + score * 0.08;
    s.vx = (dx / dist) * speed;
    s.vy = (dy / dist) * speed;
    s.x += s.vx;
    s.y += s.vy;
    s.wobble += 0.15;
    s.angle = Math.atan2(dy, dx);

    // Score: shark passed player region without hitting
    if (!s.scored && dist < 5) s.scored = true;
  });

  // Remove sharks that passed through
  const prevLen = sharks.length;
  sharks = sharks.filter(s => {
    return s.x > -60 && s.x < W() + 60 && s.y > -60 && s.y < H() + 60;
  });

  // Score = dodged sharks (ones that went off screen)
  // Actually let's score by time
  if (frameCount % 60 === 0) score++;

  // Collision detection
  for (const s of sharks) {
    const dx = player.x - s.x;
    const dy = player.y - s.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < player.r + s.r - 6) {
      if (score > bestScore) { bestScore = score; localStorage.setItem('shark_best', bestScore); }
      state = 'dead';
      for (let i = 0; i < 20; i++) {
        particles.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 1, color: '#ff4444' });
      }
      return;
    }
  }

  // Ripples
  ripples.forEach(r => { r.r += 2; r.life -= 0.05; });
  ripples = ripples.filter(r => r.life > 0);

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.04; });
  particles = particles.filter(p => p.life > 0);
}

function drawBackground() {
  const grad = ctx.createRadialGradient(W()/2, H()/2, 0, W()/2, H()/2, W()*0.7);
  grad.addColorStop(0, '#001a33');
  grad.addColorStop(1, '#000a15');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W(), H());

  // Water pattern
  ctx.strokeStyle = '#00d4ff0a';
  ctx.lineWidth = 1;
  for (let y = 0; y < H(); y += 20) {
    ctx.beginPath();
    for (let x = 0; x <= W(); x += 6) {
      const wy = y + Math.sin((x + waveT * 20) * 0.04) * 4;
      x === 0 ? ctx.moveTo(x, wy) : ctx.lineTo(x, wy);
    }
    ctx.stroke();
  }
}

function drawShark(s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.angle);
  const wobbleY = Math.sin(s.wobble) * 2;
  ctx.translate(0, wobbleY);

  const r = s.r;
  // Body
  ctx.fillStyle = '#4488aa';
  ctx.beginPath();
  ctx.ellipse(0, 0, r * 1.5, r * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tail
  ctx.fillStyle = '#336688';
  ctx.beginPath();
  ctx.moveTo(-r * 1.3, 0);
  ctx.lineTo(-r * 2, -r * 0.5);
  ctx.lineTo(-r * 2, r * 0.5);
  ctx.closePath();
  ctx.fill();

  // Fin
  ctx.fillStyle = '#336688';
  ctx.beginPath();
  ctx.moveTo(r * 0.2, -r * 0.5);
  ctx.lineTo(r * 0.5, -r * 1.1);
  ctx.lineTo(r * 0.8, -r * 0.5);
  ctx.closePath();
  ctx.fill();

  // Eye
  ctx.fillStyle = '#000000';
  ctx.beginPath();
  ctx.arc(r * 0.8, -r * 0.1, r * 0.12, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(r * 1.1, 0, r * 0.3, 0.3, Math.PI - 0.3);
  ctx.stroke();

  ctx.restore();
}

function drawPlayer() {
  const px = player.x;
  const py = player.y;
  const r = player.r;
  const pulse = 1 + Math.sin(frameCount * 0.15) * 0.1;

  // Glow
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#00d4ff';
  ctx.beginPath();
  ctx.arc(px, py, r * 2.5 * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Core
  ctx.fillStyle = player.teleportCooldown > 0 ? '#ffd700' : '#00d4ff';
  ctx.beginPath();
  ctx.arc(px, py, r * pulse, 0, Math.PI * 2);
  ctx.fill();

  // Inner dot
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(px, py, r * 0.35, 0, Math.PI * 2);
  ctx.fill();

  // Person emoji-ish
  ctx.fillStyle = '#0a0a1a';
  ctx.font = `${r * 1.1}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏊', px, py);
}

function drawRipples() {
  ripples.forEach(r => {
    ctx.save();
    ctx.globalAlpha = r.life * 0.5;
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawHUD() {
  ctx.fillStyle = '#00d4ff';
  ctx.font = `bold ${W() * 0.06}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`⏱ ${score}s`, 14, 14);
  ctx.fillStyle = '#ffd700';
  ctx.font = `${W() * 0.04}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText(`BEST: ${bestScore}s`, W() - 14, 14);

  // Teleport cooldown indicator
  if (player.teleportCooldown > 0) {
    ctx.fillStyle = '#ffd70066';
    ctx.fillRect(W()/2 - 30, H() - 20, 60 * (1 - player.teleportCooldown / 12), 8);
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 1;
    ctx.strokeRect(W()/2 - 30, H() - 20, 60, 8);
  }

  // Hint
  ctx.fillStyle = '#ffffff44';
  ctx.font = `${W() * 0.033}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('TAP to teleport away from sharks', W()/2, H() - 36);
}

function drawScreen(title, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W(), H());
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#00d4ff';
  ctx.font = `bold ${W() * 0.1}px 'Segoe UI', sans-serif`;
  ctx.fillText(title, W() / 2, H() * 0.35);
  ctx.fillStyle = '#ffffff';
  ctx.font = `${W() * 0.055}px 'Segoe UI', sans-serif`;
  ctx.fillText(sub, W() / 2, H() * 0.48);
  ctx.fillStyle = '#ffd700';
  ctx.font = `${W() * 0.045}px 'Segoe UI', sans-serif`;
  ctx.fillText(`Best: ${bestScore}s`, W() / 2, H() * 0.58);
  ctx.fillStyle = '#00d4ff';
  ctx.fillRect(W() * 0.2, H() * 0.68, W() * 0.6, H() * 0.1);
  ctx.fillStyle = '#0a0a1a';
  ctx.font = `bold ${W() * 0.055}px 'Segoe UI', sans-serif`;
  ctx.fillText('▶  TAP TO PLAY', W() / 2, H() * 0.73);
}

function loop() {
  ctx.clearRect(0, 0, W(), H());
  update();
  drawBackground();
  sharks.forEach(drawShark);
  drawRipples();
  drawPlayer();
  drawParticles();
  if (state === 'playing') drawHUD();
  if (state === 'start') drawScreen('🦈 SHARK', 'Tap to teleport away!');
  if (state === 'dead') drawScreen('💀 EATEN!', `Score: ${score}s`);
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
