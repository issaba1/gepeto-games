<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚀 Wave Shooter TURBO EDITION</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>* { margin:0; padding:0; box-sizing:border-box; } body { background:#000; overflow:hidden; touch-action:none; -webkit-user-select:none; user-select:none; } canvas { display:block; margin:0 auto; }</style>

<style>
#back-btn {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 9999;
  background: rgba(0,0,0,0.7);
  color: #00d4ff;
  border: 2px solid #00d4ff;
  border-radius: 50px;
  padding: 8px 16px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  text-decoration: none;
  font-family: system-ui, sans-serif;
  box-shadow: 0 0 10px #00d4ff44;
  transition: all 0.2s;
}
#back-btn:hover, #back-btn:active {
  background: #00d4ff;
  color: #000;
}
</style>
</head>
<body>
<a id="back-btn" href="index.html">🏠 Arcade</a>

<script>
// WAVE SHOOTER TURBO EDITION — Phaser 3
// CCGS MDA: Mechanics=shoot/dodge/collect | Dynamics=combo momentum, risk/reward | Aesthetics=power fantasy + survival
// Player Fantasy: lone ace pilot vs endless alien armada — builds to TURBO climax

const GW = Math.min(window.innerWidth, 480);
const GH = window.innerHeight;

class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }
  create() {
    const g = this.make.graphics({x:0,y:0,add:false});
    // Player ship
    g.clear(); g.fillStyle(0x00d4ff,1); g.fillTriangle(32,0,0,64,64,64);
    g.fillStyle(0xffd700,1); g.fillTriangle(32,12,18,52,46,52);
    g.fillStyle(0x005577,1); g.fillTriangle(0,28,-18,64,20,64); g.fillTriangle(64,28,82,64,44,64);
    g.fillStyle(0xff6600,0.9); g.fillCircle(18,64,7); g.fillCircle(46,64,7);
    g.generateTexture('player',82,72);
    // Enemy basic
    g.clear(); g.fillStyle(0xff4444,1); g.fillTriangle(24,64,0,0,48,0);
    g.fillStyle(0xff0000,1); g.fillCircle(24,32,10); g.fillStyle(0xffaa00,1); g.fillCircle(24,32,5);
    g.generateTexture('enemy1',48,68);
    // Enemy tank
    g.clear(); g.fillStyle(0xff8800,1); g.fillRect(4,8,56,48);
    g.fillStyle(0xffaa00,1); g.fillRect(16,0,32,20); g.fillStyle(0xdd4400,1); g.fillCircle(32,34,14);
    g.fillStyle(0xffff00,1); g.fillCircle(32,34,6);
    g.generateTexture('enemy2',64,58);
    // Enemy speeder
    g.clear(); g.fillStyle(0xaa00ff,1); g.fillTriangle(20,54,0,0,40,0);
    g.fillStyle(0xcc44ff,1); g.fillTriangle(20,28,8,54,32,54); g.fillStyle(0xffaaff,1); g.fillCircle(20,18,5);
    g.generateTexture('enemy3',40,58);
    // Boss
    g.clear(); g.fillStyle(0xff0055,1); g.fillRect(10,0,80,80);
    g.fillStyle(0xdd0033,1); g.fillRect(0,20,100,40); g.fillStyle(0xff3377,1); g.fillCircle(50,40,24);
    g.fillStyle(0xffff00,1); g.fillCircle(50,40,12); g.fillStyle(0xff0000,1); g.fillCircle(50,40,5);
    g.generateTexture('boss',100,80);
    // Bullets
    g.clear(); g.fillStyle(0xffffaa,1); g.fillRect(0,0,6,18); g.fillStyle(0xffffff,1); g.fillRect(2,0,2,8);
    g.generateTexture('bullet',6,18);
    g.clear(); g.fillStyle(0xff4444,1); g.fillCircle(5,5,5); g.fillStyle(0xff8888,1); g.fillCircle(5,5,3);
    g.generateTexture('ebullet',10,10);
    // Power-ups
    const puDefs = [{key:'pu_shield',col:0x00ffff,inner:0x0088ff},{key:'pu_rapid',col:0xff6600,inner:0xffaa00},{key:'pu_triple',col:0xffff00,inner:0xdddd00},{key:'pu_turbo',col:0xff2200,inner:0xff6600}];
    puDefs.forEach(({key,col,inner})=>{
      g.clear(); g.fillStyle(col,0.9); g.fillCircle(16,16,14); g.fillStyle(inner,1); g.fillCircle(16,16,9);
      g.fillStyle(0xffffff,1); g.fillRect(13,5,3,14);
      g.generateTexture(key,32,32);
    });
    // Particle
    g.clear(); g.fillStyle(0xffffff,1); g.fillCircle(4,4,4);
    g.generateTexture('particle',8,8);
    g.destroy();
    this.scene.start('MenuScene');
  }
}

class MenuScene extends Phaser.Scene {
  constructor() { super('MenuScene'); }
  create() {
    const W=this.scale.width, H=this.scale.height;
    this.cameras.main.setBackgroundColor('#0a0a1e');
    this.starGfx = this.add.graphics();
    this.stars = Array.from({length:120},()=>({x:Phaser.Math.Between(0,W),y:Phaser.Math.Between(0,H),s:Phaser.Math.FloatBetween(0.5,2.5),sp:Phaser.Math.FloatBetween(0.4,2)}));
    const fs = n => Math.floor(W*n);
    this.add.text(W/2,H*0.1,'🚀 WAVE SHOOTER',{fontSize:`${fs(0.085)}px`,fontFamily:'Arial Black,sans-serif',color:'#00d4ff',stroke:'#002244',strokeThickness:5}).setOrigin(0.5);
    this.add.text(W/2,H*0.22,'TURBO EDITION',{fontSize:`${fs(0.055)}px`,fontFamily:'Arial Black,sans-serif',color:'#ffd700',stroke:'#442200',strokeThickness:4}).setOrigin(0.5);
    const hs = localStorage.getItem('ws_hs')||0;
    this.add.text(W/2,H*0.33,`🏆 BEST: ${hs}`,{fontSize:`${fs(0.045)}px`,fontFamily:'Arial,sans-serif',color:'#ffdd88'}).setOrigin(0.5);
    // Animated ship preview
    const gfx = this.add.graphics();
    const sx=W/2, sy=H*0.47;
    gfx.fillStyle(0x00d4ff,1); gfx.fillTriangle(sx,sy-40,sx-26,sy+28,sx+26,sy+28);
    gfx.fillStyle(0xffd700,1); gfx.fillTriangle(sx,sy-22,sx-12,sy+12,sx+12,sy+12);
    gfx.fillStyle(0x005577,1); gfx.fillTriangle(sx-26,sy+2,sx-46,sy+28,sx-10,sy+28); gfx.fillTriangle(sx+26,sy+2,sx+46,sy+28,sx+10,sy+28);
    gfx.fillStyle(0xff6600,1); gfx.fillCircle(sx-14,sy+28,8); gfx.fillCircle(sx+14,sy+28,8);
    this.tweens.add({targets:gfx,y:{from:0,to:-8},yoyo:true,repeat:-1,duration:900,ease:'Sine.InOut'});
    const btn = this.add.text(W/2,H*0.65,'  ▶  PLAY  ',{fontSize:`${fs(0.075)}px`,fontFamily:'Arial Black,sans-serif',color:'#ffffff',backgroundColor:'#00d4ff33',padding:{x:24,y:14},stroke:'#00d4ff',strokeThickness:2}).setOrigin(0.5).setInteractive({useHandCursor:true});
    btn.on('pointerover',()=>btn.setStyle({color:'#00d4ff'}));
    btn.on('pointerout',()=>btn.setStyle({color:'#ffffff'}));
    btn.on('pointerdown',()=>{this.cameras.main.flash(200,0,212,255);this.time.delayedCall(200,()=>this.scene.start('GameScene'));});
    this.tweens.add({targets:btn,scaleX:1.06,scaleY:1.06,yoyo:true,repeat:-1,duration:650,ease:'Sine.InOut'});
    this.add.text(W/2,H*0.8,'WASD/Arrows + SPACE  |  Mobile: joystick + fire',{fontSize:`${fs(0.033)}px`,fontFamily:'Arial,sans-serif',color:'#666688',align:'center'}).setOrigin(0.5);
    this.add.text(W/2,H*0.92,'❤️❤️❤️  3 lives  •  TURBO MODE after 30 seconds!',{fontSize:`${fs(0.031)}px`,fontFamily:'Arial,sans-serif',color:'#445566',align:'center'}).setOrigin(0.5);
  }
  update() {
    const W=this.scale.width,H=this.scale.height;
    this.starGfx.clear();
    this.stars.forEach(st=>{st.y+=st.sp;if(st.y>H){st.y=0;st.x=Phaser.Math.Between(0,W);}this.starGfx.fillStyle(0xffffff,0.4+0.5*(st.sp/2));this.starGfx.fillCircle(st.x,st.y,st.s);});
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }
  create() {
    const W=this.scale.width,H=this.scale.height;
    this.W=W;this.H=H;
    // State
    this.lives=3;this.score=0;this.wave=1;this.combo=0;this.comboTimer=0;
    this.gameTime=0;this.turboMode=false;this.invincible=false;this.invincibleTimer=0;
    this.shieldActive=false;this.shieldTimer=0;this.rapidFire=false;this.rapidTimer=0;
    this.tripleShot=false;this.tripleTimer=0;this.shootCooldown=0;this.bossAlive=false;this.gameOver=false;
    this.cameras.main.setBackgroundColor('#0a0a1e');
    // Stars
    this.starGfx=this.add.graphics().setDepth(0);
    this.stars=Array.from({length:150},()=>({x:Phaser.Math.Between(0,W),y:Phaser.Math.Between(0,H),s:Phaser.Math.FloatBetween(0.5,2),sp:Phaser.Math.FloatBetween(0.5,3)}));
    // Groups
    this.bullets=this.physics.add.group();
    this.enemyBullets=this.physics.add.group();
    this.enemies=this.physics.add.group();
    this.powerups=this.physics.add.group();
    // Particles
    this.boom=this.add.particles(0,0,'particle',{speed:{min:60,max:280},scale:{start:0.9,end:0},alpha:{start:1,end:0},lifespan:{min:200,max:500},quantity:1,emitting:false,tint:[0xff8800,0xffff00,0xff4400,0xffffff]}).setDepth(20);
    this.thrust=this.add.particles(0,0,'particle',{speed:{min:40,max:120},scale:{start:0.5,end:0},alpha:{start:0.8,end:0},lifespan:200,quantity:1,emitting:false,tint:[0xff6600,0xff3300,0xffaa00]}).setDepth(8);
    // Player
    this.player=this.physics.add.sprite(W/2,H-100,'player').setCollideWorldBounds(true).setDepth(10);
    this.player.setBodySize(40,55,true);
    this.shieldGfx=this.add.graphics().setDepth(11);
    // UI
    const fs=n=>Math.floor(W*n);
    this.scoreTxt=this.add.text(10,10,'SCORE: 0',{fontSize:`${fs(0.042)}px`,fontFamily:'Arial Black,sans-serif',color:'#ffd700'}).setDepth(40);
    this.waveTxt=this.add.text(W/2,10,'WAVE 1',{fontSize:`${fs(0.042)}px`,fontFamily:'Arial Black,sans-serif',color:'#00d4ff'}).setOrigin(0.5,0).setDepth(40);
    this.heartsTxt=this.add.text(W-10,10,'❤️❤️❤️',{fontSize:`${fs(0.045)}px`}).setOrigin(1,0).setDepth(40);
    this.comboTxt=this.add.text(W/2,H*0.12,'',{fontSize:`${fs(0.055)}px`,fontFamily:'Arial Black,sans-serif',color:'#ff8800'}).setOrigin(0.5).setDepth(40);
    this.puTxt=this.add.text(10,H-40,'',{fontSize:`${fs(0.035)}px`,fontFamily:'Arial,sans-serif',color:'#00ffff'}).setDepth(40);
    this.turboBg=this.add.graphics().setDepth(40);
    this.turboBarGfx=this.add.graphics().setDepth(41);
    this.turboLabel=this.add.text(W/2,H-58,'⚡ TURBO',{fontSize:`${fs(0.028)}px`,fontFamily:'Arial Black,sans-serif',color:'#ff8800'}).setOrigin(0.5,1).setDepth(41);
    this.turboTxt=this.add.text(W/2,H/2,'🚀 TURBO MODE!',{fontSize:`${fs(0.11)}px`,fontFamily:'Arial Black,sans-serif',color:'#ff6600',stroke:'#ffffff',strokeThickness:5}).setOrigin(0.5).setAlpha(0).setDepth(60);
    // Input
    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys({up:Phaser.Input.Keyboard.KeyCodes.W,down:Phaser.Input.Keyboard.KeyCodes.S,left:Phaser.Input.Keyboard.KeyCodes.A,right:Phaser.Input.Keyboard.KeyCodes.D,space:Phaser.Input.Keyboard.KeyCodes.SPACE});
    // Mobile
    this.joystickActive=false;this.joystickOrigin={x:0,y:0};this.joystickCurrent={x:0,y:0};
    this.touchShooting=false;this.mobileGfx=this.add.graphics().setDepth(50);
    this.input.addPointer(3);
    this.input.on('pointerdown',this.onPD,this);
    this.input.on('pointermove',this.onPM,this);
    this.input.on('pointerup',this.onPU,this);
    // Overlaps
    this.physics.add.overlap(this.bullets,this.enemies,this.bulletHitEnemy,null,this);
    this.physics.add.overlap(this.player,this.enemies,this.playerHitEnemy,null,this);
    this.physics.add.overlap(this.player,this.enemyBullets,this.playerHitBullet,null,this);
    this.physics.add.overlap(this.player,this.powerups,this.collectPowerup,null,this);
    this.time.delayedCall(600,()=>this.startWave());
  }

  onPD(p) {
    if(this.gameOver)return;
    if(p.x<this.W/2){this.joystickActive=true;this.joystickOrigin={x:p.x,y:p.y};this.joystickCurrent={x:p.x,y:p.y};this.jsPtr=p;}
    else{this.touchShooting=true;this.firePtr=p;}
  }
  onPM(p) {
    if(this.jsPtr&&p.id===this.jsPtr.id)this.joystickCurrent={x:p.x,y:p.y};
  }
  onPU(p) {
    if(this.jsPtr&&p.id===this.jsPtr.id){this.joystickActive=false;this.jsPtr=null;this.joystickOrigin={x:0,y:0};this.joystickCurrent={x:0,y:0};}
    if(this.firePtr&&p.id===this.firePtr.id){this.touchShooting=false;this.firePtr=null;}
  }

  startWave() {
    const W=this.W,H=this.H;
    const boss = this.wave%5===0;
    const banner=this.add.text(W/2,H/2,boss?`⚠️ BOSS WAVE ${this.wave}!`:`WAVE ${this.wave}`,{fontSize:`${Math.floor(W*0.1)}px`,fontFamily:'Arial Black,sans-serif',color:boss?'#ff0055':'#ffffff',stroke:'#000000',strokeThickness:6}).setOrigin(0.5).setDepth(55);
    this.tweens.add({targets:banner,alpha:{from:1,to:0},y:H/2-80,duration:1500,ease:'Power2',onComplete:()=>banner.destroy()});
    if(boss)this.spawnBoss(); else this.spawnWaveEnemies();
  }

  spawnWaveEnemies() {
    const count=5+this.wave*2, spd=65+this.wave*8;
    for(let i=0;i<count;i++){
      this.time.delayedCall(i*320,()=>{
        if(this.gameOver)return;
        const t=this.wave<3?'enemy1':(Math.random()<0.5?'enemy1':Math.random()<0.6?'enemy2':'enemy3');
        this.spawnEnemy(t,Phaser.Math.Between(30,this.W-30),-40,spd);
      });
    }
  }

  spawnEnemy(type,x,y,speed) {
    const e=this.enemies.create(x,y,type).setDepth(12);
    e.enemyType=type;
    const HP={enemy1:1,enemy2:3,enemy3:1},SC={enemy1:100,enemy2:300,enemy3:150},SZ={enemy1:[36,55],enemy2:[46,46],enemy3:[30,45]};
    e.health=HP[type]||1; e.maxHealth=e.health; e.scoreValue=SC[type]||100;
    e.setBodySize(...(SZ[type]||[40,50]));
    const spds={enemy1:speed,enemy2:speed*0.7,enemy3:speed*1.6};
    e.baseSpeed=spds[type]||speed;
    e.movePattern=type==='enemy3'?'zigzag':type==='enemy2'?'shoot':'straight';
    e.patternTimer=0; e.zigzagDir=1; e.shootTimer=Phaser.Math.Between(80,160);
    e.body.setVelocity(type==='enemy3'?Phaser.Math.Between(-80,80):0,e.baseSpeed);
    e.body.setGravityY(0);
    return e;
  }

  spawnBoss() {
    this.bossAlive=true;
    const W=this.W,H=this.H;
    const b=this.enemies.create(W/2,-50,'boss').setDepth(15).setScale(1.2);
    b.enemyType='boss'; b.health=20+this.wave*5; b.maxHealth=b.health; b.scoreValue=2000+this.wave*500;
    b.setBodySize(90,70); b.movePattern='boss'; b.shootTimer=0; b.strafeDir=1; b.strafeTimer=0;
    b.body.setVelocity(0,70); b.body.setGravityY(0);
    this.bossHpBg=this.add.graphics().setDepth(42);
    this.bossHpBar=this.add.graphics().setDepth(43);
    this.bossHpTxt=this.add.text(W/2,H-24,'BOSS',{fontSize:`${Math.floor(W*0.038)}px`,fontFamily:'Arial Black,sans-serif',color:'#ff0055'}).setOrigin(0.5,1).setDepth(44);
  }

  update(time,delta) {
    if(this.gameOver)return;
    const dt=delta/1000,W=this.W,H=this.H;
    this.gameTime+=dt;
    if(!this.turboMode&&this.gameTime>=30)this.activateTurbo();
    // Timers
    if(this.shootCooldown>0)this.shootCooldown-=dt;
    if(this.invincibleTimer>0){this.invincibleTimer-=dt;if(this.invincibleTimer<=0){this.invincible=false;this.player.setAlpha(1);}}
    if(this.shieldTimer>0){this.shieldTimer-=dt;if(this.shieldTimer<=0)this.shieldActive=false;}
    if(this.rapidTimer>0){this.rapidTimer-=dt;if(this.rapidTimer<=0)this.rapidFire=false;}
    if(this.tripleTimer>0){this.tripleTimer-=dt;if(this.tripleTimer<=0)this.tripleShot=false;}
    if(this.comboTimer>0){this.comboTimer-=dt;if(this.comboTimer<=0){this.combo=0;this.comboTxt.setText('');}}
    this.handleMovement(dt);
    if(this.touchShooting||this.cursors.space.isDown||this.wasd.space.isDown)this.shoot();
    this.updateEnemies(dt);
    this.updateStars(dt);
    this.updateShield();
    this.updateUI();
    if(this.player.active){const sp=Math.abs(this.player.body.velocity.x)+Math.abs(this.player.body.velocity.y);if(sp>30){this.thrust.setPosition(this.player.x,this.player.y+30);this.thrust.explode(2);}}
    if(this.turboMode&&Math.random()<0.04)this.cameras.main.shake(30,0.002);
    this.bullets.getChildren().forEach(b=>{if(b.y<-20)b.destroy();});
    this.enemyBullets.getChildren().forEach(b=>{if(b.y>H+20||b.x<-20||b.x>W+20)b.destroy();});
    this.enemies.getChildren().forEach(e=>{if(e.y>H+60){e.destroy();this.checkWaveComplete();}});
    // Draw mobile controls
    this.mobileGfx.clear();
    if(this.joystickActive){
      this.mobileGfx.lineStyle(2,0xffffff,0.3); this.mobileGfx.strokeCircle(this.joystickOrigin.x,this.joystickOrigin.y,55);
      this.mobileGfx.fillStyle(0xffffff,0.5); this.mobileGfx.fillCircle(this.joystickCurrent.x,this.joystickCurrent.y,22);
    }
    // Fire button hint
    if(!this.joystickActive){
      this.mobileGfx.fillStyle(0xff4400,0.15); this.mobileGfx.fillCircle(W*0.8,H*0.85,45);
      this.mobileGfx.lineStyle(2,0xff4400,0.4); this.mobileGfx.strokeCircle(W*0.8,H*0.85,45);
    }
  }

  handleMovement(dt) {
    const speed=this.turboMode?350:230;
    let vx=0,vy=0;
    if(this.joystickActive){
      const dx=this.joystickCurrent.x-this.joystickOrigin.x,dy=this.joystickCurrent.y-this.joystickOrigin.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>8){const f=Math.min(dist/55,1);vx=(dx/dist)*speed*f;vy=(dy/dist)*speed*f;}
    } else {
      if(this.cursors.left.isDown||this.wasd.left.isDown)vx=-speed;
      else if(this.cursors.right.isDown||this.wasd.right.isDown)vx=speed;
      if(this.cursors.up.isDown||this.wasd.up.isDown)vy=-speed;
      else if(this.cursors.down.isDown||this.wasd.down.isDown)vy=speed;
    }
    this.player.body.setVelocity(vx,vy);
    this.player.rotation=Phaser.Math.Linear(this.player.rotation,vx*0.05,0.15);
  }

  shoot() {
    if(!this.player.active||this.gameOver)return;
    const cd=this.rapidFire?0.07:this.turboMode?0.12:0.18;
    if(this.shootCooldown>0)return;
    this.shootCooldown=cd;
    const px=this.player.x,py=this.player.y,spd=this.turboMode?-750:-560;
    const fire=(ox)=>{const b=this.bullets.create(px+ox,py-30,'bullet').setDepth(13);b.body.setVelocity(0,spd);b.body.setGravityY(0);};
    if(this.tripleShot){fire(-18);fire(0);fire(18);}else fire(0);
  }

  bulletHitEnemy(bullet,enemy) {
    bullet.destroy(); enemy.health--;
    this.tweens.add({targets:enemy,alpha:0.2,yoyo:true,duration:60});
    if(enemy.health<=0)this.killEnemy(enemy);
  }

  killEnemy(enemy) {
    const x=enemy.x,y=enemy.y,isBoss=enemy.enemyType==='boss';
    const pts=enemy.scoreValue*(Math.min(this.combo+1,8));
    this.score+=pts; this.combo++; this.comboTimer=2.5;
    this.boom.explode(isBoss?45:20,x,y);
    this.cameras.main.shake(isBoss?450:80,isBoss?0.022:0.006);
    if(isBoss){for(let i=0;i<5;i++)this.time.delayedCall(i*110,()=>this.boom.explode(12,x+Phaser.Math.Between(-40,40),y+Phaser.Math.Between(-30,30)));}
    const ft=this.add.text(x,y,`+${pts}${this.combo>1?' x'+Math.min(this.combo,8):''}`,{fontSize:`${Math.floor(this.W*0.04)}px`,fontFamily:'Arial Black,sans-serif',color:this.combo>3?'#ff6600':'#ffd700',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setDepth(50);
    this.tweens.add({targets:ft,y:y-70,alpha:0,duration:900,ease:'Power2',onComplete:()=>ft.destroy()});
    if(Math.random()<(isBoss?1:0.22))this.dropPowerup(x,y);
    if(isBoss){this.bossAlive=false;if(this.bossHpBg){this.bossHpBg.destroy();this.bossHpBar.destroy();this.bossHpTxt.destroy();}}
    enemy.destroy(); this.checkWaveComplete();
  }

  checkWaveComplete() {
    if(this.enemies.countActive()===0&&!this.bossAlive){
      this.wave++;
      this.waveTxt.setText(`WAVE ${this.wave}`);
      this.time.delayedCall(2000,()=>{if(!this.gameOver)this.startWave();});
    }
  }

  playerHitEnemy(player,enemy) {
    if(this.invincible)return; this.takeDamage();
    if(enemy.enemyType!=='boss'){enemy.destroy();this.checkWaveComplete();}
  }
  playerHitBullet(player,bullet) { if(this.invincible)return; bullet.destroy(); this.takeDamage(); }

  takeDamage() {
    if(this.shieldActive){this.shieldActive=false;this.shieldTimer=0;this.cameras.main.shake(200,0.015);this.boom.explode(8,this.player.x,this.player.y);return;}
    this.lives--; this.combo=0; this.comboTxt.setText('');
    this.invincible=true; this.invincibleTimer=2.5;
    this.cameras.main.shake(300,0.022);
    this.boom.setTint(0xff4444); this.boom.explode(14,this.player.x,this.player.y);
    if(this.lives<=0)this.endGame();
    else this.tweens.add({targets:this.player,alpha:0.3,yoyo:true,repeat:8,duration:150});
  }

  collectPowerup(player,pu) {
    const type=pu.puType; pu.destroy();
    if(type==='shield'){this.shieldActive=true;this.shieldTimer=8;}
    else if(type==='rapid'){this.rapidFire=true;this.rapidTimer=7;}
    else if(type==='triple'){this.tripleShot=true;this.tripleTimer=8;}
    else if(type==='turbo'){this.gameTime=Math.max(this.gameTime,28);}
    const msgs={shield:'🛡 SHIELD!',rapid:'🔥 RAPID FIRE!',triple:'⚡ TRIPLE SHOT!',turbo:'🚀 TURBO SOON!'};
    const ft=this.add.text(this.W/2,this.H*0.45,msgs[type]||'',{fontSize:`${Math.floor(this.W*0.06)}px`,fontFamily:'Arial Black,sans-serif',color:'#00ffff',stroke:'#004444',strokeThickness:4}).setOrigin(0.5).setDepth(55).setAlpha(0);
    this.tweens.add({targets:ft,alpha:{from:1,to:0},y:this.H*0.35,duration:1200,ease:'Power2',onComplete:()=>ft.destroy()});
  }

  dropPowerup(x,y) {
    const types=['shield','rapid','triple','turbo'],keys=['pu_shield','pu_rapid','pu_triple','pu_turbo'];
    const i=Phaser.Math.Between(0,3);
    const pu=this.powerups.create(x,y,keys[i]).setDepth(14);
    pu.puType=types[i]; pu.body.setVelocity(0,80); pu.body.setGravityY(0);
    this.tweens.add({targets:pu,angle:360,duration:1500,repeat:-1,ease:'Linear'});
  }

  updateEnemies(dt) {
    const W=this.W,H=this.H,tm=this.turboMode?1.55:1;
    this.enemies.getChildren().forEach(e=>{
      if(!e.active)return;
      if(e.movePattern==='zigzag'){
        e.patternTimer+=dt; if(e.patternTimer>0.6){e.zigzagDir*=-1;e.patternTimer=0;}
        e.body.setVelocityX(e.zigzagDir*130*tm); e.body.setVelocityY(e.baseSpeed*tm);
        if(e.x<20)e.zigzagDir=1; else if(e.x>W-20)e.zigzagDir=-1;
      } else if(e.movePattern==='shoot'){
        e.body.setVelocityY(e.baseSpeed*tm); e.shootTimer-=dt;
        if(e.shootTimer<=0){e.shootTimer=this.turboMode?1.1:2.0;this.enemyShoot(e);}
      } else if(e.movePattern==='boss'){
        e.strafeTimer+=dt; if(e.strafeTimer>1.8){e.strafeDir*=-1;e.strafeTimer=0;}
        if(e.y<90)e.body.setVelocityY(65); else e.body.setVelocityY(0);
        e.body.setVelocityX(e.strafeDir*170*tm);
        if(e.x<80){e.strafeDir=1;e.strafeTimer=0;} else if(e.x>W-80){e.strafeDir=-1;e.strafeTimer=0;}
        e.shootTimer-=dt; if(e.shootTimer<=0){e.shootTimer=this.turboMode?0.45:0.75;this.bossFire(e);}
        if(this.bossHpBg){
          const bw=W*0.7,bx=(W-bw)/2;
          this.bossHpBg.clear().fillStyle(0x440000,1).fillRoundedRect(bx,H-32,bw,12,6);
          const f=e.health/e.maxHealth,col=f>0.5?0x00dd00:f>0.25?0xdddd00:0xff0000;
          this.bossHpBar.clear().fillStyle(col,1).fillRoundedRect(bx,H-32,bw*f,12,6);
        }
      } else {
        e.body.setVelocityY(e.baseSpeed*tm);
      }
    });
  }

  enemyShoot(enemy) {
    if(!this.player.active)return;
    const b=this.enemyBullets.create(enemy.x,enemy.y+20,'ebullet').setDepth(12);
    const ang=Phaser.Math.Angle.Between(enemy.x,enemy.y,this.player.x,this.player.y),spd=this.turboMode?280:200;
    b.body.setVelocity(Math.cos(ang)*spd,Math.sin(ang)*spd); b.body.setGravityY(0);
  }

  bossFire(boss) {
    if(!this.player.active)return;
    if(Math.random()<(this.turboMode?0.4:0.7)){this.enemyShoot(boss);}
    else{for(let a=0;a<360;a+=45){const b=this.enemyBullets.create(boss.x,boss.y+20,'ebullet').setDepth(12);const rad=Phaser.Math.DegToRad(a);b.body.setVelocity(Math.cos(rad)*160,Math.sin(rad)*160);b.body.setGravityY(0);}}
  }

  activateTurbo() {
    this.turboMode=true;
    this.cameras.main.shake(700,0.028);
    this.cameras.main.flash(500,255,100,0);
    this.tweens.add({targets:this.turboTxt,alpha:{from:1,to:0},scaleX:{from:0.5,to:1.6},scaleY:{from:0.5,to:1.6},duration:2000,ease:'Power2'});
    this.enemies.getChildren().forEach(e=>{e.baseSpeed*=1.5;});
  }

  updateStars(dt) {
    const W=this.W,H=this.H,sp=this.turboMode?3.5:1;
    this.starGfx.clear();
    this.stars.forEach(st=>{
      st.y+=st.sp*sp; if(st.y>H){st.y=0;st.x=Phaser.Math.Between(0,W);}
      this.starGfx.fillStyle(this.turboMode?0xff9900:0xffffff,0.3+0.5*(st.sp/3));
      this.starGfx.fillCircle(st.x,st.y,st.s*(this.turboMode?1.6:1));
    });
  }

  updateShield() {
    this.shieldGfx.clear();
    if(this.shieldActive&&this.player.active){
      const p=0.5+0.5*Math.sin(this.gameTime*7);
      this.shieldGfx.lineStyle(3,0x00ffff,p); this.shieldGfx.strokeCircle(this.player.x,this.player.y,42);
      this.shieldGfx.lineStyle(1,0x00ffff,p*0.4); this.shieldGfx.strokeCircle(this.player.x,this.player.y,50);
    }
    if(this.invincible)this.player.setAlpha(Math.sin(this.gameTime*22)>0?0.3:1);
  }

  updateUI() {
    const W=this.W,H=this.H;
    this.scoreTxt.setText(`SCORE: ${this.score}`);
    this.heartsTxt.setText('❤️'.repeat(Math.max(0,this.lives)));
    if(this.combo>=2){this.comboTxt.setText(`${this.combo}x COMBO!`);this.comboTxt.setScale(1+0.04*Math.sin(this.gameTime*10));}
    let pu='';
    if(this.shieldActive)pu+=`🛡${Math.ceil(this.shieldTimer)}s `;
    if(this.rapidFire)pu+=`🔥${Math.ceil(this.rapidTimer)}s `;
    if(this.tripleShot)pu+=`⚡${Math.ceil(this.tripleTimer)}s `;
    if(this.turboMode)pu+='🚀TURBO!';
    this.puTxt.setText(pu);
    const prog=Math.min(this.gameTime/30,1);
    this.turboBg.clear().fillStyle(0x111111,0.7).fillRoundedRect(10,H-56,W-20,10,5);
    const col=this.turboMode?0xff6600:prog>0.8?0xff8800:0x00d4ff;
    this.turboBarGfx.clear().fillStyle(col,1).fillRoundedRect(10,H-56,(W-20)*(this.turboMode?1:prog),10,5);
    if(this.turboMode){const p=0.7+0.3*Math.sin(this.gameTime*8);this.cameras.main.setTint(Phaser.Display.Color.GetColor(Math.floor(255),Math.floor(150+50*p),0));}
  }

  endGame() {
    this.gameOver=true;
    const hs=parseInt(localStorage.getItem('ws_hs')||'0');
    if(this.score>hs)localStorage.setItem('ws_hs',this.score);
    this.cameras.main.clearTint();
    this.time.delayedCall(600,()=>this.scene.start('GameOverScene',{score:this.score,wave:this.wave,hs:Math.max(this.score,hs)}));
  }
}

class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOverScene'); }
  create(data) {
    const W=this.scale.width,H=this.scale.height;
    this.cameras.main.setBackgroundColor('#0a0a1e');
    this.cameras.main.fadeIn(400,0,0,0);
    const fs=n=>Math.floor(W*n);
    this.add.text(W/2,H*0.2,'GAME OVER',{fontSize:`${fs(0.11)}px`,fontFamily:'Arial Black,sans-serif',color:'#ff4444',stroke:'#000',strokeThickness:6}).setOrigin(0.5);
    this.add.text(W/2,H*0.36,`SCORE: ${data.score}`,{fontSize:`${fs(0.065)}px`,fontFamily:'Arial Black,sans-serif',color:'#ffd700'}).setOrigin(0.5);
    this.add.text(W/2,H*0.48,`WAVE: ${data.wave}`,{fontSize:`${fs(0.05)}px`,fontFamily:'Arial,sans-serif',color:'#aaaaaa'}).setOrigin(0.5);
    this.add.text(W/2,H*0.58,`🏆 BEST: ${data.hs}`,{fontSize:`${fs(0.045)}px`,fontFamily:'Arial,sans-serif',color:'#ffdd88'}).setOrigin(0.5);
    if(data.score>=data.hs&&data.score>0)this.add.text(W/2,H*0.68,'🎉 NEW HIGH SCORE! 🎉',{fontSize:`${fs(0.045)}px`,fontFamily:'Arial Black,sans-serif',color:'#00ff88'}).setOrigin(0.5);
    const btn=this.add.text(W/2,H*0.8,' PLAY AGAIN ',{fontSize:`${fs(0.07)}px`,fontFamily:'Arial Black,sans-serif',color:'#ffffff',backgroundColor:'#00d4ff33',padding:{x:20,y:12},stroke:'#00d4ff',strokeThickness:2}).setOrigin(0.5).setInteractive({useHandCursor:true});
    btn.on('pointerdown',()=>{this.cameras.main.fade(200,0,0,0);this.time.delayedCall(200,()=>this.scene.start('GameScene'));});
    this.tweens.add({targets:btn,scaleX:1.05,scaleY:1.05,yoyo:true,repeat:-1,duration:700,ease:'Sine.InOut'});
    const menu=this.add.text(W/2,H*0.9,'◀ MENU',{fontSize:`${fs(0.035)}px`,fontFamily:'Arial,sans-serif',color:'#666688'}).setOrigin(0.5).setInteractive({useHandCursor:true});
    menu.on('pointerdown',()=>this.scene.start('MenuScene'));
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: GW, height: GH,
  backgroundColor: '#0a0a1e',
  physics: { default:'arcade', arcade:{gravity:{y:0},debug:false} },
  scene: [BootScene, MenuScene, GameScene, GameOverScene],
  scale: { mode:Phaser.Scale.FIT, autoCenter:Phaser.Scale.CENTER_BOTH },
  parent: document.body
});
</script>
